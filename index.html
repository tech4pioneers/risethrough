<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pain2Care"/>
<meta name="theme-color" content="#1a6fa0"/>
<title>Pain2Care</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#c8e8f8 0%,#a8d4f0 25%,#bce0f5 50%,#d4edf8 75%,#b8dcf0 100%);min-height:100vh;overscroll-behavior:none}
input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:8px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;cursor:pointer;background:#e63946;box-shadow:0 2px 8px rgba(230,57,70,0.4)}
input::placeholder,textarea::placeholder{color:#9bbccc}
textarea{font-family:'Nunito',sans-serif}
::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes scaleIn{from{transform:scale(0.93);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(26,111,160,0.25)}50%{box-shadow:0 0 40px rgba(26,111,160,0.5)}}
.glass{background:rgba(255,255,255,0.52);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.72);box-shadow:0 8px 32px rgba(26,80,130,0.1)}
.glass-soft{background:rgba(255,255,255,0.35);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.5)}
.btn-blue{background:linear-gradient(135deg,#1a6fa0,#2296c4);color:#fff;border:none;border-radius:50px;padding:16px 28px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;width:100%;box-shadow:0 4px 18px rgba(26,111,160,0.32);transition:opacity 0.2s,transform 0.1s;letter-spacing:0.01em}
.btn-blue:active{opacity:0.85;transform:scale(0.97)}
.btn-blue:disabled{opacity:0.5;cursor:not-allowed}
.btn-outline{background:rgba(255,255,255,0.55);color:#1a6fa0;border:2px solid rgba(26,111,160,0.28);border-radius:50px;padding:14px 28px;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;cursor:pointer;width:100%;transition:all 0.2s}
.btn-red{background:linear-gradient(135deg,#e63946,#ff5868);color:#fff;border:none;border-radius:50px;padding:16px 28px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;width:100%;box-shadow:0 4px 18px rgba(230,57,70,0.32);transition:opacity 0.2s,transform 0.1s}
.field{width:100%;background:rgba(255,255,255,0.62);border:1.5px solid rgba(26,111,160,0.18);border-radius:14px;color:#1a3a52;font-family:'Nunito',sans-serif;font-size:15px;padding:13px 16px;outline:none;transition:border-color 0.2s}
.field:focus{border-color:rgba(26,111,160,0.48);box-shadow:0 0 0 3px rgba(26,111,160,0.1)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useRef,useEffect}=React;
const {AreaChart,Area,LineChart,Line,XAxis,YAxis,Tooltip,ResponsiveContainer}=Recharts;

const C={
  blue:"#1a6fa0",blueMid:"#2196c4",blueLight:"#5bb8e8",
  red:"#e63946",redLight:"#ff6877",
  green:"#2d9a6e",teal:"#1a8c7a",
  textDark:"#1a3a52",textMid:"#3d6480",textLight:"#6b95ad",
  gold:"#f4a261",purple:"#7B3F9E"

const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const PAIN_AREAS=["Head","Neck","Shoulders","Upper Back","Lower Back","Chest","Hips","Legs","Knees","Feet"];
const MOODS=[
  {emoji:"😤",label:"Struggling",value:1,color:"#e63946"},
  {emoji:"😔",label:"Low",value:2,color:"#f4a261"},
  {emoji:"😐",label:"Neutral",value:3,color:"#f4c261"},
  {emoji:"🙂",label:"Okay",value:4,color:"#5bb8e8"},
  {emoji:"💪",label:"Strong",value:5,color:"#2d9a6e"},
];
const TRAUMA_CHECKS=[
  {id:"sleep",label:"Sleep felt disrupted or restless",icon:"🌙"},
  {id:"anxiety",label:"I felt anxious or on-edge today",icon:"⚡"},
  {id:"trigger",label:"Something triggered a stress response",icon:"🔴"},
  {id:"safe",label:"I felt safe in my body today",icon:"🛡️"},
  {id:"grounded",label:"I felt grounded and present",icon:"🌱"},
  {id:"support",label:"I reached out to someone for support",icon:"🤝"},
];
const AFFIRMATIONS=[
  "Your pain is real. Your healing is possible.",
  "Every small step forward is still forward.",
  "You are more than your diagnosis.",
  "Rest is not giving up. Rest is rebuilding.",
  "Your body is doing its best. So are you.",
];
const SEED_CHAT=[
  {id:1,user:"Maya R.",avatar:"🌸",text:"Anyone else notice their pain spikes mid-week? Wednesday always gets me.",time:"2h ago",mine:false},
  {id:2,user:"Jordan K.",avatar:"🌊",text:"Yes! Short noon rest really helps me manage that.",time:"1h ago",mine:false},
  {id:3,user:"Sam T.",avatar:"🌿",text:"Gentle reminder: rest is not failure 💚",time:"45m ago",mine:false},
  {id:4,user:"Alex P.",avatar:"💙",text:"Does anyone use heat therapy? Just got a heating pad for back pain.",time:"20m ago",mine:false},
];
const EXERCISES=[
  {id:"anxiety",icon:"🧘",title:"Anxiety Management",desc:"Breathing & grounding",steps:["Find a comfortable position and close your eyes.","Breathe in slowly for 4 counts.","Hold for 4 counts.","Exhale slowly for 6 counts.","Repeat 5 times, focusing only on your breath.","Name 5 things you can see around you."]},
  {id:"goals",icon:"🎯",title:"Goal Setting",desc:"Small steps toward healing",steps:["Write one thing you'd like to improve this week.","Break it into 3 small daily actions.","Celebrate every small win — they all count.","Review each evening: did you take one step today?"]},
  {id:"selfcare",icon:"💆",title:"Self-Care",desc:"Nurture your body & mind",steps:["Drink a full glass of water right now.","Step outside for 5 minutes of fresh air.","Put your hand on your heart and breathe deeply.","Do one kind thing for your body today."]},
  {id:"grounding",icon:"🌍",title:"Grounding",desc:"Connect with the present",steps:["Feel your feet firmly on the floor.","Name 5 things you can see.","Name 4 things you can touch.","Name 3 things you can hear.","Name 2 things you can smell.","Name 1 thing you can taste."]},
  {id:"mindfulness",icon:"🌸",title:"Mindfulness",desc:"Awareness without judgment",steps:["Sit comfortably and gently close your eyes.","Bring attention to your breathing — don't control it.","Notice thoughts without judging them.","Gently return focus to your breath each time.","Continue for 5–10 minutes."]},
  {id:"emotions",icon:"💡",title:"Understanding Emotions",desc:"Identify & process feelings",steps:["Name what you are feeling right now.","Ask: where do I feel this in my body?","Is this feeling familiar?","What does this feeling need from me?","Write it down or speak it aloud."]},
];
const seedHistory=()=>Array.from({length:7},(_,i)=>{
  const pain=Math.floor(Math.random()*5)+3,mood=Math.floor(Math.random()*3)+2,checks=Math.floor(Math.random()*4)+1;
  return{id:i,date:DAYS[i],fullDate:new Date(Date.now()-(6-i)*86400000).toLocaleDateString("en-US",{month:"short",day:"numeric"}),
    painLevel:pain,mood,checkedCount:checks,areas:[],notes:"",score:Math.round(((10-pain)*3+mood*4+checks*5)/3)};
});

/* ── Logo SVG ── */
const Logo=({size=56})=>(
  <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
    <defs>
      <radialGradient id="bgrad" cx="35%" cy="35%"><stop offset="0%" stopColor="#5bb8e8"/><stop offset="100%" stopColor="#1a6fa0"/></radialGradient>
      <radialGradient id="rgrad" cx="50%" cy="40%"><stop offset="0%" stopColor="#ff8a8a"/><stop offset="100%" stopColor="#c0392b"/></radialGradient>
    </defs>
    <circle cx="50" cy="50" r="47" fill="url(#bgrad)" stroke="rgba(255,255,255,0.5)" strokeWidth="2"/>
    <ellipse cx="50" cy="30" rx="9" ry="10" fill="url(#rgrad)"/>
    <path d="M33 68 Q39 46 50 44 Q61 46 67 68Z" fill="url(#rgrad)"/>
    <circle cx="50" cy="52" r="7" fill="rgba(255,140,100,0.55)"/>
    <path d="M17 56 Q24 36 37 49 Q29 55 27 66 Q18 69 17 56Z" fill="#2196c4" opacity="0.9"/>
    <path d="M19 53 Q27 45 35 51" stroke="#7dd4f5" strokeWidth="2" fill="none"/>
    <path d="M20 58 Q28 50 36 55" stroke="#7dd4f5" strokeWidth="1.5" fill="none"/>
    <path d="M83 56 Q76 36 63 49 Q71 55 73 66 Q82 69 83 56Z" fill="#2d9a6e" opacity="0.9"/>
    <path d="M81 53 Q73 45 65 51" stroke="#5cd4a0" strokeWidth="2" fill="none"/>
    <path d="M80 58 Q72 50 64 55" stroke="#5cd4a0" strokeWidth="1.5" fill="none"/>
    <ellipse cx="38" cy="22" rx="11" ry="7" fill="rgba(255,255,255,0.22)" transform="rotate(-22 38 22)"/>
  </svg>
);

/* ── Primitives ── */
const GCard=({children,style={}})=>(
  <div className="glass" style={{borderRadius:20,padding:22,margin:"0 18px 16px",...style}}>{children}</div>
);
const SectionTitle=({icon,title,sub})=>(
  <div style={{padding:"18px 22px 4px",animation:"fadeIn 0.4s ease both"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}>
      {icon&&<span style={{fontSize:22}}>{icon}</span>}
      <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:21,fontWeight:800,color:C.textDark,letterSpacing:"-0.01em"}}>{title}</div>
    </div>
    {sub&&<div style={{fontSize:12,color:C.textLight,paddingLeft:icon?32:0,marginTop:3}}>{sub}</div>}
  </div>
);
const BottomNav=({tab,setTab})=>{
  const items=[{id:"home",icon:"🏠",label:"Home"},{id:"pain",icon:"🩺",label:"Pain"},{id:"trauma",icon:"🧠",label:"Recovery"},{id:"community",icon:"💬",label:"Community"},{id:"profile",icon:"👤",label:"Profile"}];
  return(
    <div className="glass" style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,display:"flex",justifyContent:"space-around",padding:"8px 0 max(10px,env(safe-area-inset-bottom))",zIndex:100,borderRadius:"20px 20px 0 0",borderBottom:"none",boxShadow:"0 -4px 20px rgba(26,80,130,0.1)"}}>
      {items.map(t=>(
        <button key={t.id} onClick={()=>setTab(t.id)}
          style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",color:tab===t.id?C.blue:C.textLight,fontSize:9,fontWeight:tab===t.id?800:600,textTransform:"uppercase",letterSpacing:"0.04em",border:"none",background:"transparent",padding:"4px 8px",transition:"color 0.2s",minWidth:0}}>
          <span style={{fontSize:tab===t.id?22:19,transition:"font-size 0.2s"}}>{t.icon}</span>
          {t.label}
          {tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:C.blue}}/>}
        </button>
      ))}
    </div>
  );
};
const AppShell=({children,tab,setTab,user,onLogout})=>(
  <div style={{background:"transparent",minHeight:"100vh",maxWidth:430,margin:"0 auto",color:C.textDark,overflowX:"hidden"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"max(18px,env(safe-area-inset-top)) 18px 8px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <Logo size={30}/>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:15}}>
          <span style={{color:C.red}}>Pain</span><span style={{color:C.blue}}>2</span><span style={{color:C.teal}}>Care</span>
        </div>
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <div className="glass-soft" style={{borderRadius:18,padding:"4px 11px",fontSize:12,fontWeight:700,color:C.textMid}}>
          {user?.name?.split(" ")[0]||"You"}
        </div>
        <button onClick={onLogout} className="glass-soft" style={{borderRadius:18,padding:"4px 11px",fontSize:11,fontWeight:700,color:C.textLight,border:"none",cursor:"pointer"}}>Out</button>
      </div>
    </div>
    <div style={{overflowY:"auto",maxHeight:"100vh",paddingBottom:88}}>{children}</div>
    <BottomNav tab={tab} setTab={setTab}/>

);

/* ══ AUTH ══ */
const AuthShell=({children})=>(
  <div style={{minHeight:"100vh",maxWidth:430,margin:"0 auto",background:"linear-gradient(160deg,#daf0ff 0%,#b4dcf5 30%,#c6e8f8 65%,#dbf0ff 100%)",overflowX:"hidden",position:"relative"}}>
    <div style={{position:"fixed",top:-90,right:-90,width:260,height:260,borderRadius:"50%",background:"radial-gradient(circle,rgba(26,111,160,0.18),transparent 70%)",pointerEvents:"none"}}/>
    <div style={{position:"fixed",bottom:-70,left:-70,width:210,height:210,borderRadius:"50%",background:"radial-gradient(circle,rgba(45,154,110,0.13),transparent 70%)",pointerEvents:"none"}}/>
    <div style={{overflowY:"auto",maxHeight:"100vh",padding:"0 24px 48px"}}>
      <div style={{textAlign:"center",padding:"44px 0 14px",animation:"fadeIn 0.5s ease both"}}>
        <div style={{display:"inline-block",animation:"float 3s ease-in-out infinite"}}><Logo size={70}/></div>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:27,fontWeight:800,marginTop:12}}>
          <span style={{color:C.red}}>Pain</span><span style={{color:C.blue}}>2</span><span style={{color:C.teal}}>Care</span>
        </div>
        <div style={{fontSize:11,color:C.textLight,letterSpacing:"0.12em",textTransform:"uppercase",marginTop:4}}>Chronic Pain & Trauma Recovery</div>
      </div>
      {children}
    </div>
  </div>
);

const LoginScreen=({onLogin,onGoRegister})=>{
  const [email,setEmail]=useState(""); const [pass,setPass]=useState("");
  const [errors,setErrors]=useState({}); const [loading,setLoading]=useState(false);
  const doLogin=async()=>{
    const e={};
    if(!email.includes("@")) e.email="Enter a valid email";
    if(pass.length<6) e.pass="Min 6 characters";
    if(Object.keys(e).length){setErrors(e);return;}
    setLoading(true); await new Promise(r=>setTimeout(r,800));
    const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");
    const user=users.find(u=>u.email===email&&u.password===pass);
    if(!user){setErrors({pass:"Incorrect email or password"});setLoading(false);return;}
    onLogin(user); setLoading(false);
  };
  return(
    <div style={{animation:"fadeIn 0.5s ease both"}}>
      <div style={{marginBottom:24}}>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:22,fontWeight:800,color:C.textDark}}>Welcome Back 👋</div>
        <div style={{fontSize:13,color:C.textLight,marginTop:4}}>Sign in to continue your healing journey</div>
      </div>
      {[{label:"Username / Email",key:"email",type:"email",val:email,set:setEmail,ph:"you@email.com",err:errors.email},
        {label:"Password",key:"pass",type:"password",val:pass,set:setPass,ph:"••••••••",err:errors.pass}
      ].map(f=>(
        <div key={f.key} style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:5}}>{f.label}</div>
          <input className="field" type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}/>
          {f.err&&<div style={{fontSize:11,color:C.red,marginTop:3}}>⚠ {f.err}</div>}
        </div>
      ))}
      <div style={{textAlign:"right",marginBottom:22}}><span style={{fontSize:12,color:C.blue,fontWeight:700,cursor:"pointer"}}>Forgot Password?</span></div>
      <button className="btn-blue" onClick={doLogin} disabled={loading}>{loading?"Signing in…":"Sign In →"}</button>
      <div style={{textAlign:"center",marginTop:18,fontSize:13,color:C.textLight}}>
        Don't have an account?{" "}<span onClick={onGoRegister} style={{color:C.blue,fontWeight:800,cursor:"pointer"}}>Register</span>
      </div>
    </div>
  );
};

const RegisterScreen=({onGoLogin,onRegistered})=>{
  const [name,setName]=useState(""); const [email,setEmail]=useState("");
  const [pass,setPass]=useState(""); const [confirm,setConfirm]=useState("");
  const [dob,setDob]=useState(""); const [gender,setGender]=useState("");
  const [agreed,setAgreed]=useState(false); const [errors,setErrors]=useState({});
  const [loading,setLoading]=useState(false); const [showTerms,setShowTerms]=useState(false);
  const doRegister=async()=>{
    const e={};
    if(name.trim().length<2) e.name="Enter your full name";
    if(!email.includes("@")) e.email="Enter a valid email";
    if(pass.length<6) e.pass="Min 6 characters";
    if(pass!==confirm) e.confirm="Passwords don't match";
    if(!agreed) e.agreed="Please accept the terms";
    if(Object.keys(e).length){setErrors(e);return;}
    setLoading(true); await new Promise(r=>setTimeout(r,900));
    const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");
    if(users.find(u=>u.email===email)){setErrors({email:"Already registered"});setLoading(false);return;}
    const code=Math.floor(100000+Math.random()*900000).toString();
    const newUser={name:name.trim(),email,password:pass,dob,gender,verified:false,verifyCode:code,trialStart:Date.now(),plan:"trial",silhouette:1};
    users.push(newUser); localStorage.setItem("p2c_users",JSON.stringify(users));
    setLoading(false); onRegistered({email,code,name:name.trim()});
  };
  if(showTerms) return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:19,fontWeight:800,color:C.textDark,marginBottom:14}}>Terms & Conditions</div>
      <div className="glass" style={{borderRadius:16,padding:18,maxHeight:"52vh",overflowY:"auto",marginBottom:18,fontSize:13,lineHeight:1.7,color:C.textMid}}>
        <p><strong>1. Acceptance</strong><br/>By using Pain2Care, you agree to these Terms.</p><br/>
        <p><strong>2. Not Medical Advice</strong><br/>Pain2Care is a self-tracking tool only — not a medical device or diagnosis tool. Always consult a qualified healthcare provider.</p><br/>
        <p><strong>3. Privacy</strong><br/>Your health data is stored securely. We never sell your personal data to third parties.</p><br/>
        <p><strong>4. Free Trial</strong><br/>A 7-day free trial is provided. After the trial, a subscription is required to continue using the app.</p><br/>
        <p><strong>5. Community</strong><br/>The community chat is anonymous and supportive. Harmful or abusive content is not permitted.</p><br/>
        <p><strong>6. Limitation of Liability</strong><br/>Pain2Care is not liable for any decisions made based on app data.</p><br/>
        <p><strong>7. Changes</strong><br/>We may update these terms with notice via the app.</p>
      </div>
      <div onClick={()=>setAgreed(!agreed)} style={{display:"flex",alignItems:"center",gap:12,marginBottom:18,padding:"12px 14px",background:"rgba(26,111,160,0.07)",borderRadius:13,cursor:"pointer"}}>
        <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${agreed?C.blue:"rgba(26,111,160,0.28)"}`,background:agreed?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
          {agreed&&<span style={{color:"#fff",fontSize:13,fontWeight:900}}>✓</span>}
        </div>
        <span style={{fontSize:13,color:C.textMid,fontWeight:600}}>I agree to the Terms & Conditions</span>
      </div>
      <button className="btn-blue" onClick={()=>setShowTerms(false)} disabled={!agreed}>Continue →</button>
    </div>
  );
  return(
    <div style={{animation:"fadeIn 0.5s ease both"}}>
      <div style={{marginBottom:18}}>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:21,fontWeight:800,color:C.textDark}}>Create Account</div>
        <div style={{fontSize:13,color:C.textLight,marginTop:3}}>Start your free 7-day trial</div>
      </div>
      {[{label:"Full Name",key:"name",val:name,set:setName,type:"text",ph:"Your full name",err:errors.name},
        {label:"Email",key:"email",val:email,set:setEmail,type:"email",ph:"you@email.com",err:errors.email},
        {label:"Date of Birth",key:"dob",val:dob,set:setDob,type:"date",ph:"",err:null},
      ].map(f=>(
        <div key={f.key} style={{marginBottom:13}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>{f.label}</div>
          <input className="field" type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph}/>
          {f.err&&<div style={{fontSize:11,color:C.red,marginTop:3}}>⚠ {f.err}</div>}
        </div>
      ))}
      <div style={{marginBottom:13}}>
        <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Gender</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {["Female","Male","Other","Prefer not to say"].map(g=>(
            <div key={g} onClick={()=>setGender(g)}
              style={{flex:"1 0 40%",padding:"9px 6px",borderRadius:11,border:`1.5px solid ${gender===g?C.blue:"rgba(26,111,160,0.18)"}`,background:gender===g?"rgba(26,111,160,0.1)":"rgba(255,255,255,0.5)",cursor:"pointer",textAlign:"center",fontSize:12,fontWeight:700,color:gender===g?C.blue:C.textLight,transition:"all 0.15s"}}>
              {g}
            </div>
          ))}
        </div>
      </div>
      {[{label:"Password",key:"pass",val:pass,set:setPass,err:errors.pass},
        {label:"Confirm Password",key:"confirm",val:confirm,set:setConfirm,err:errors.confirm}

const VerifyScreen=({email,code,onVerified,onBack})=>{
  const [input,setInput]=useState(["","","","","",""]);
  const [error,setError]=useState(""); const [loading,setLoading]=useState(false);
  const refs=useRef([]);
  const handleInput=(i,v)=>{if(!/^\d?$/.test(v))return;const n=[...input];n[i]=v;setInput(n);if(v&&i<5)refs.current[i+1]?.focus();};
  const handleKey=(i,e)=>{if(e.key==="Backspace"&&!input[i]&&i>0)refs.current[i-1]?.focus();};
  const verify=async()=>{
    const entered=input.join("");if(entered.length<6){setError("Enter all 6 digits");return;}
    setLoading(true); await new Promise(r=>setTimeout(r,700));
    if(entered===code){
      const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");
      const idx=users.findIndex(u=>u.email===email);
      if(idx>=0){users[idx].verified=true;localStorage.setItem("p2c_users",JSON.stringify(users));}
      onVerified();
    } else {setError("Incorrect code. Try again.");}
    setLoading(false);
  };
  return(
    <div style={{animation:"fadeIn 0.5s ease both"}}>
      <div style={{marginBottom:18}}>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:20,fontWeight:800,color:C.textDark}}>Verify Your Email ✉️</div>

      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:18}}>
        {input.map((v,i)=>(
          <input key={i} ref={el=>refs.current[i]=el} value={v} maxLength={1}
            onChange={e=>handleInput(i,e.target.value)} onKeyDown={e=>handleKey(i,e)}
            style={{width:42,height:54,textAlign:"center",background:"rgba(255,255,255,0.7)",border:`2px solid ${v?C.blue:"rgba(26,111,160,0.2)"}`,borderRadius:13,color:C.textDark,fontFamily:"'Montserrat',sans-serif",fontSize:22,fontWeight:800,outline:"none"}}/>

};

  const checkedCount=Object.values(traumaChecks).filter(Boolean).length;
  const selMood=MOODS.find(m=>m.value===mood);

    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setVoiceStatus("Voice not supported.");return;}
    const rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang="en-US";
    rec.onstart=()=>{setIsListening(true);setVoiceStatus("Listening…");};
    rec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join("");setNotes(t);if(e.results[0].isFinal)setVoiceStatus("✓ Saved!");};
    rec.onerror=()=>{setIsListening(false);setVoiceStatus("Mic error — try again");};
    rec.onend=()=>setIsListening(false);
    recRef.current=rec;rec.start();
  };
  const stopVoice=()=>{recRef.current?.stop();setIsListening(false);};

    const score=Math.round(((10-painLevel)*3+(mood||3)*4+checkedCount*5)/3);

  const renderContent=()=>{
    switch(tab){
      case "home": return <HomeTab user={user} onModuleSelect={setTab} onShowPaywall={onShowPaywall} history={history}/>;
      case "pain": return <PainModule user={user} history={history} setHistory={setHistory} onShowPaywall={onShowPaywall}/>;
      case "violence": return <ViolenceModule user={user} onShowPaywall={onShowPaywall}/>;
      case "trauma": return <TraumaModule user={user}/>;
      case "community": return <CommunityModule user={user}/>;
      case "trends": return <TrendsTab history={history}/>;
      case "profile": return <ProfileTab user={user} onLogout={onLogout} onShowPaywall={onShowPaywall}/>;
      default: return <HomeTab user={user} onModuleSelect={setTab} onShowPaywall={onShowPaywall} history={history}/>;
    }
  };
  const navTab=["home","pain","trauma","community","profile"].includes(tab)?tab:"home";
  return(
    <AppShell tab={navTab} setTab={handleSetTab} user={user} onLogout={onLogout}>
      {renderContent()}
    </AppShell>
  );
};

/* ══ ROOT ══ */
function App(){
  const [step,setStep]=useState("login");
  const [user,setUser]=useState(null);
  const [vData,setVData]=useState(null);
  useEffect(()=>{try{const s=sessionStorage.getItem("p2c_session");if(s){const u=JSON.parse(s);setUser(u);setStep("app");}}catch(e){}},[]); 
  const handleLogin=(u)=>{setUser(u);sessionStorage.setItem("p2c_session",JSON.stringify(u));const d=Math.max(0,7-Math.floor((Date.now()-(u.trialStart||Date.now()))/86400000));const paid=u.plan==="monthly"||u.plan==="annual";setStep(!paid&&d===0?"paywall":"app");};
  const handleReg=({email,code,name})=>{setVData({email,code,name});setStep("verify");};
  const handleVerified=()=>{const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");const u=users.find(u=>u.email===vData.email);if(u){setUser(u);sessionStorage.setItem("p2c_session",JSON.stringify(u));}setStep("silhouette");};
  const handleSil=(sel)=>{const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");const idx=users.findIndex(u=>u.email===user?.email);if(idx>=0){users[idx].silhouette=sel;localStorage.setItem("p2c_users",JSON.stringify(users));}setUser(u=>({...u,silhouette:sel}));setStep("welcome");};
  const handleLogout=()=>{sessionStorage.removeItem("p2c_session");setUser(null);setStep("login");};
  const handleSub=(plan)=>{const u={...user,plan};setUser(u);sessionStorage.setItem("p2c_session",JSON.stringify(u));setStep("app");};
  if(step==="login") return<AuthShell><LoginScreen onLogin={handleLogin} onGoRegister={()=>setStep("register")}/></AuthShell>;
  if(step==="register") return<AuthShell><RegisterScreen onGoLogin={()=>setStep("login")} onRegistered={handleReg}/></AuthShell>;
  if(step==="verify") return<AuthShell><VerifyScreen email={vData?.email} code={vData?.code} onVerified={handleVerified} onBack={()=>setStep("register")}/></AuthShell>;
  if(step==="silhouette") return<SilhouetteScreen onContinue={handleSil}/>;
  if(step==="welcome") return<WelcomeScreen user={user} onContinue={()=>setStep("app")}/>;
  if(step==="paywall") return<PaywallScreen user={user} onSubscribe={handleSub} onLogout={handleLogout}/>;
  if(step==="app") return<MainApp user={user} onLogout={handleLogout} onShowPaywall={()=>setStep("paywall")}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
