const ProfileTab=({user,onLogout,onShowPaywall,onUpdateUser,onBack})=>{
  const T=getLang(user);
  const isPaid=["normal_monthly","normal_annual","premium_monthly","premium_annual"].includes(user?.plan);
  const daysLeft=Math.max(0,5-Math.floor((Date.now()-(user?.trialStart||Date.now()))/86400000));
  const [screen,setScreen]=useState("main"); // main | editProfile | mydata | deleteConfirm
  const [deleting,setDeleting]=useState(false);
  const [deleted,setDeleted]=useState(false);

  // Edit profile state
  const [editName,setEditName]=useState(user?.name||"");
  const [editDob,setEditDob]=useState(user?.dob||"");
  const [editGender,setEditGender]=useState(user?.gender||"");
  const [editSilhouette,setEditSilhouette]=useState(user?.silhouette||2);
  const [saving,setSaving]=useState(false);
  const [savedOk,setSavedOk]=useState(false);

  // Count stored data
  const storageKey=`p2c_vdocs_${user?.uid||user?.email||"local"}`;
  const vdocs=JSON.parse(localStorage.getItem(storageKey)||"[]");
  const hasPin=!!localStorage.getItem(`p2c_vpin_${user?.uid||user?.email||"local"}`);

  // Edit Profile screen
  if(screen==="editProfile") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("main")} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>{T.editProfile}</div>
      </div>

      {/* Avatar */}
      <GCard style={{marginTop:14,textAlign:"center",paddingTop:22,paddingBottom:22}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1a6fa0,#2d9a6e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 10px",color:"#fff",fontFamily:"'Montserrat',sans-serif",fontWeight:800}}>
          {editName?.[0]?.toUpperCase()||"U"}
        </div>
        <div style={{fontSize:12,color:C.textLight}}>{user?.email}</div>
      </GCard>

      <GCard>
        {/* Name */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{T.fullName}</div>
          <input className="field" value={editName} onChange={e=>setEditName(e.target.value)} placeholder="Your name"/>
        </div>
        {/* DOB */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{T.dateOfBirth}</div>
          <input className="field" type="date" value={editDob} onChange={e=>setEditDob(e.target.value)}/>
        </div>
        {/* Gender */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Gender</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[T.male,T.female,"Non-binary","Prefer not to say"].map(g=>(
              <button key={g} onClick={()=>setEditGender(g)}
                style={{padding:"8px 14px",borderRadius:20,border:`1.5px solid ${editGender===g?C.blue:"rgba(26,111,160,0.2)"}`,background:editGender===g?"rgba(26,111,160,0.1)":"transparent",color:editGender===g?C.blue:C.textMid,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                {g}
              </button>
            ))}
          </div>
        </div>
        {/* Body type */}
        <div>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:8}}>Body Type</div>
          <div style={{display:"flex",gap:10}}>
            {[{v:1,label:"Slim"},{v:2,label:"Normal"},{v:3,label:"Large"}].map(b=>(
              <button key={b.v} onClick={()=>setEditSilhouette(b.v)}
                style={{flex:1,padding:"10px 0",borderRadius:14,border:`1.5px solid ${editSilhouette===b.v?C.blue:"rgba(26,111,160,0.2)"}`,background:editSilhouette===b.v?"rgba(26,111,160,0.1)":"transparent",color:editSilhouette===b.v?C.blue:C.textMid,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>
                {b.label}
              </button>
            ))}
          </div>
        </div>
      </GCard>

      <GCard style={{background:"rgba(26,111,160,0.04)"}}>
        <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Email</div>
        <div style={{fontSize:13,color:C.textMid}}>{user?.email}</div>
        <div style={{fontSize:11,color:C.textLight,marginTop:4}}>Email cannot be changed here.</div>
      </GCard>

      <div style={{margin:"0 18px 32px"}}>
        <button onClick={async()=>{
          setSaving(true);
          const updated={...user,name:editName,dob:editDob,gender:editGender,silhouette:editSilhouette};
          await onUpdateUser(updated);
          await new Promise(r=>setTimeout(r,500));
          setSaving(false);setSavedOk(true);
          setTimeout(()=>{setSavedOk(false);setScreen("main");},1200);
        }} className="btn-blue" disabled={saving||!editName}>
          {savedOk?"✅ Saved!":saving?"Saving…":"💾 Save Changes"}
        </button>
      </div>
    </div>
  );

  const deleteAllData=async()=>{
    setDeleting(true);
    // Clear localStorage
    const keysToDelete=Object.keys(localStorage).filter(k=>k.includes(user?.uid||user?.email||"local")||k.includes("p2c_"));
    keysToDelete.forEach(k=>localStorage.removeItem(k));
    sessionStorage.removeItem("p2c_session");
    // Delete from Firebase (use fbSet with null to remove nodes)
    if(window._fbReady&&fbDb&&fbRef&&fbSet&&user?.uid){
      try{await fbSet(fbRef(fbDb,`users/${user.uid}`),null);}catch(e){}
      try{await fbSet(fbRef(fbDb,`vdocs/${user.uid}`),null);}catch(e){}
    }
    await new Promise(r=>setTimeout(r,1000));
    setDeleting(false);
    setDeleted(true);
    setTimeout(()=>onLogout(),1500);
  };

  if(screen==="notifications") return <NotificationsScreen onBack={()=>setScreen("main")} user={user}/>;
  if(screen==="language") return <LanguageScreen onBack={()=>setScreen("main")} user={user}/>;
  if(screen==="help") return <HelpScreen onBack={()=>setScreen("main")}/>;

  if(deleted) return(
    <div style={{minHeight:"60vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,padding:"0 24px"}}>
      <div style={{fontSize:48}}>✅</div>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:20,color:C.green}}>Data Deleted</div>
      <div style={{fontSize:13,color:C.textLight,textAlign:"center"}}>All your data has been permanently removed. Signing you out…</div>
    </div>
  );

  if(screen==="deleteConfirm") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("mydata")} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.red}}>⚠️ Delete All Data</div>
      </div>
      <GCard style={{marginTop:14,background:"rgba(230,57,70,0.06)",border:"1px solid rgba(230,57,70,0.2)"}}>
        <div style={{fontSize:14,fontWeight:800,color:C.red,marginBottom:10}}>This cannot be undone!</div>
        <div style={{fontSize:13,color:C.textMid,lineHeight:1.7}}>
          This will permanently delete:<br/>
          • Your account and profile<br/>
          • All pain check-in history<br/>
          • All incident records<br/>
          • All secure photos<br/>
          • All settings and preferences
        </div>
      </GCard>
      <div style={{padding:"0 18px",display:"flex",gap:10,marginBottom:28}}>
        <button onClick={()=>setScreen("mydata")} className="btn-outline" style={{flex:1}}>{T.cancel}</button>
        <button onClick={deleteAllData} disabled={deleting}
          style={{flex:2,padding:"16px",borderRadius:50,border:"none",background:"linear-gradient(135deg,#e63946,#ff5868)",color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer"}}>
          {deleting?"Deleting…":"🗑 Delete Everything"}
        </button>
      </div>
    </div>
  );

  if(screen==="mydata") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("main")} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>🔐 My Data (GDPR)</div>
      </div>

      <GCard style={{marginTop:14,background:"rgba(26,111,160,0.05)",border:"1px solid rgba(26,111,160,0.15)"}}>
        <div style={{fontWeight:800,fontSize:13,color:C.blue,marginBottom:8}}>📋 Data We Store About You</div>
        {[
          {label:"Account",value:`Name, email, date of birth, gender`,icon:"👤"},
          {label:"Health Data",value:`Pain check-ins, mood, body map entries`,icon:"🩺"},
          {label:"Incident Records",value:`${vdocs.length} record${vdocs.length!==1?"s":""} stored`,icon:"📄"},
          {label:"Secure PIN",value:hasPin?"Set (encrypted locally)":"Not set",icon:"🔒"},
          {label:"Subscription",value:isPaid?"Active plan stored":"Trial",icon:"💳"},
          {label:"Storage Location",value:"Firebase (EU servers) + device",icon:"☁️"},
        ].map((row,i,arr)=>(
          <div key={row.label} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none"}}>
            <span style={{fontSize:16,flexShrink:0}}>{row.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:12,color:C.textDark}}>{row.label}</div>
              <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{row.value}</div>
            </div>
          </div>
        ))}
      </GCard>

      <GCard>
        <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:13}}>⚖️ Your GDPR Rights</div>
        {[
          {icon:"👁",right:"Right to Access",desc:"You can see all data above"},
          {icon:"✏️",right:"Right to Rectification",desc:"Edit your profile anytime"},
          {icon:"📦",right:"Right to Portability",desc:"Export coming in next update"},
          {icon:"🗑",right:"Right to Erasure",desc:"Delete all your data below"},
        ].map((r,i,arr)=>(
          <div key={r.right} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none"}}>
            <span style={{fontSize:18,flexShrink:0}}>{r.icon}</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:C.textDark}}>{r.right}</div>
              <div style={{fontSize:12,color:C.textLight,marginTop:2}}>{r.desc}</div>
            </div>
          </div>
        ))}
      </GCard>

      <GCard style={{background:"rgba(26,111,160,0.04)"}}>
        <div style={{fontSize:12,color:C.textLight,lineHeight:1.7,marginBottom:12}}>
          Pain2Care is GDPR compliant. Your data is never sold to third parties. Health data is processed under Article 9(2)(a) — explicit consent.
        </div>
        <div style={{fontSize:11,color:C.textLight}}>Data Controller: Tech4Pioneers · privacy@pain2care.app</div>
      </GCard>

      <div style={{margin:"0 18px 32px"}}>
        <button onClick={()=>setScreen("deleteConfirm")}
          style={{width:"100%",padding:"14px",borderRadius:50,border:"2px solid rgba(230,57,70,0.4)",background:"rgba(230,57,70,0.06)",color:C.red,fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:14,cursor:"pointer"}}>
          🗑 Delete All My Data
        </button>
      </div>
    </div>
  );

  return(
    <div>
      <SectionTitle icon="👤" title="Profile" sub="Your account & settings" onHome={onBack}/>
      <GCard style={{textAlign:"center",padding:26}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:"linear-gradient(135deg,#1a6fa0,#2d9a6e)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 11px",color:"#fff",fontFamily:"'Montserrat',sans-serif",fontWeight:800}}>
          {user?.name?.[0]?.toUpperCase()||"U"}
        </div>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>{user?.name}</div>
        <div style={{fontSize:13,color:C.textLight,marginTop:3}}>{user?.email}</div>
        <div style={{marginTop:11,display:"inline-block",padding:"4px 13px",borderRadius:18,
          background:isPaid?(user?.plan?.startsWith("premium")?"rgba(249,168,37,0.12)":"rgba(26,111,160,0.1)"):"rgba(244,162,97,0.1)",
          fontSize:11,fontWeight:700,
          color:isPaid?(user?.plan?.startsWith("premium")?C.gold:C.blue):C.gold}}>
          {isPaid?(user?.plan?.startsWith("premium")?"⭐ Premium Member":"💙 Normal Member"):`Free Trial · ${daysLeft} days left`}
        </div>
      </GCard>
      {/* Subscription card — shown for trial users */}
      {!isPaid&&(
        <div className="glass" style={{margin:"0 18px 14px",borderRadius:16,padding:"16px 16px",border:"1px solid rgba(26,111,160,0.15)"}}>
          <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:4}}>{T.freeTrial}</div>
          <div style={{fontSize:12,color:C.textLight,marginBottom:12}}>
            ⏳ {daysLeft} day{daysLeft!==1?"s":""} remaining · Normal Plan features active<br/>
            {T.premiumNotAvailable}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onShowPaywall}
              style={{flex:1,padding:"11px 8px",borderRadius:11,border:"2px solid "+C.blue,background:"rgba(26,111,160,0.08)",
                fontWeight:800,fontSize:12,color:C.blue,cursor:"pointer"}}>
              💙 Normal Plan
            </button>
            <button onClick={onShowPaywall}
              style={{flex:1,padding:"11px 8px",borderRadius:11,border:"none",
                background:"linear-gradient(135deg,"+C.gold+",#e67e00)",
                fontWeight:800,fontSize:12,color:"#fff",cursor:"pointer"}}>
              ⭐ Premium Plan
            </button>
          </div>
        </div>
      )}
      {/* Upgrade banner for Normal plan users */}
      {isPaid&&!user?.plan?.startsWith("premium")&&(
        <div className="glass" style={{margin:"0 18px 14px",borderRadius:16,padding:"14px 16px",border:"1px solid rgba(249,168,37,0.25)"}}>
          <div style={{fontWeight:800,fontSize:12,color:C.gold,marginBottom:4}}>⭐ Upgrade to Premium</div>
          <div style={{fontSize:11,color:C.textLight,marginBottom:10}}>Unlock photo documentation, AI analysis & priority support</div>
          <button onClick={onShowPaywall}
            style={{width:"100%",padding:"10px",borderRadius:10,border:"none",
              background:"linear-gradient(135deg,"+C.gold+",#e67e00)",
              fontWeight:800,fontSize:12,color:"#fff",cursor:"pointer"}}>
            Upgrade to Premium →
          </button>
        </div>
      )}
      <GCard>
        <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:13}}>Account</div>
        {[
          {icon:"✏️",label:"Edit Profile",action:()=>{setEditName(user?.name||"");setEditDob(user?.dob||"");setEditGender(user?.gender||"");setEditSilhouette(user?.silhouette||2);setScreen("editProfile");}},
          {icon:"🔔",label:"Notifications",action:()=>setScreen("notifications")},
          {icon:"🌍",label:"Language",action:()=>setScreen("language")},
          {icon:"🔐",label:"My Data & Privacy (GDPR)",action:()=>setScreen("mydata"),highlight:true},
          {icon:"❓",label:"Help & Support",action:()=>setScreen("help")},
        ].map((item,i,arr)=>(
          <div key={item.label} onClick={item.action||undefined}
            style={{display:"flex",alignItems:"center",gap:11,padding:"12px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none",cursor:"pointer"}}>
            <span style={{fontSize:17}}>{item.icon}</span>
            <span style={{flex:1,fontSize:13,fontWeight:600,color:item.highlight?C.blue:C.textMid}}>{item.label}</span>
            <span style={{color:C.blue,fontSize:15}}>›</span>
          </div>
        ))}
      </GCard>
      <div style={{margin:"0 18px 32px"}}><button className="btn-outline" onClick={onLogout}>Sign Out</button></div>
    </div>
  );
};

/* ══ NOTIFICATIONS SCREEN ══ */
const NotificationsScreen=({onBack,user})=>{
  const key=`p2c_notifs_${user?.uid||"local"}`;
  const [prefs,setPrefs]=useState(()=>{try{return JSON.parse(localStorage.getItem(key)||"{}");}catch(e){return{};}});
  const toggle=(k)=>{
    const updated={...prefs,[k]:!prefs[k]};
    setPrefs(updated);
    localStorage.setItem(key,JSON.stringify(updated));
  };
  const items=[
    {id:"daily",icon:"📅",label:"Daily Check-in Reminder",desc:"Remind me to log my pain daily"},
    {id:"morning",icon:"🌅",label:"Morning Wellness Check",desc:"Good morning nudge at 8:00 AM"},
    {id:"evening",icon:"🌙",label:"Evening Reflection",desc:"End of day check-in at 8:00 PM"},
    {id:"community",icon:"💬",label:"Community Replies",desc:"When someone replies to your message"},
    {id:"tips",icon:"💡",label:"Recovery Tips",desc:"Weekly wellness tips & exercises"},
  ];
  return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>🔔 Notifications</div>
      </div>
      <GCard style={{marginTop:14}}>
        {items.map((item,i,arr)=>(
          <div key={item.id} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none"}}>
            <span style={{fontSize:20,flexShrink:0}}>{item.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13,color:C.textDark}}>{item.label}</div>
              <div style={{fontSize:11,color:C.textLight,marginTop:2}}>{item.desc}</div>
            </div>
            <div onClick={()=>toggle(item.id)}
              style={{width:44,height:26,borderRadius:13,background:prefs[item.id]?C.blue:"rgba(26,111,160,0.15)",cursor:"pointer",position:"relative",transition:"background 0.2s",flexShrink:0}}>
              <div style={{position:"absolute",top:3,left:prefs[item.id]?20:3,width:20,height:20,borderRadius:"50%",background:"#fff",boxShadow:"0 1px 4px rgba(0,0,0,0.2)",transition:"left 0.2s"}}/>
            </div>
          </div>
        ))}
      </GCard>
      <GCard style={{background:"rgba(26,111,160,0.04)"}}>
        <div style={{fontSize:12,color:C.textLight,lineHeight:1.7}}>📱 Push notifications require the app to be installed on your home screen. Go to Safari → Share → Add to Home Screen.</div>
      </GCard>
    </div>
  );
};

/* ══ LANGUAGE SCREEN ══ */
const LanguageScreen=({onBack,user})=>{
  const T=getLang(user);
  const key=`p2c_lang_${user?.uid||"local"}`;
  const [selected,setSelected]=useState(()=>localStorage.getItem(key)||"en");
  const langs=[
    {code:"en",flag:"🇬🇧",label:"English"},
    {code:"fi",flag:"🇫🇮",label:"Suomi (Finnish)"},
    {code:"sv",flag:"🇸🇪",label:"Svenska (Swedish)"},
    {code:"de",flag:"🇩🇪",label:"Deutsch (German)"},
    {code:"es",flag:"🇪🇸",label:"Español (Spanish)"},
    {code:"fr",flag:"🇫🇷",label:"Français (French)"},
    {code:"pt",flag:"🇵🇹",label:"Português (Portuguese)"},
  ];
  return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={onBack} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>{T.language}</div>
        <button onClick={()=>{localStorage.setItem(key,selected);onBack();}} style={{marginLeft:"auto",background:"linear-gradient(135deg,#1a6fa0,#0e4f78)",border:"none",borderRadius:9,padding:"5px 16px",fontSize:12,fontWeight:700,color:"#fff",cursor:"pointer"}}>💾 Save</button>
      </div>
      <GCard style={{marginTop:14}}>
        {langs.map((lang,i,arr)=>(
          <div key={lang.code} onClick={()=>{setSelected(lang.code);localStorage.setItem(key,lang.code);}}
            style={{display:"flex",alignItems:"center",gap:13,padding:"13px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none",cursor:"pointer"}}>
            <span style={{fontSize:24}}>{lang.flag}</span>
            <span style={{flex:1,fontSize:14,fontWeight:600,color:C.textDark}}>{lang.label}</span>
            {selected===lang.code
              ?<div style={{width:22,height:22,borderRadius:"50%",background:C.blue,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff"}}>✓</div>
              :<div style={{width:22,height:22,borderRadius:"50%",border:"2px solid rgba(26,111,160,0.2)"}}/>}
          </div>
        ))}
      </GCard>
      <GCard style={{background:"rgba(244,162,97,0.08)",border:"1px solid rgba(244,162,97,0.2)"}}>
        <div style={{fontSize:12,color:C.gold,fontWeight:700,marginBottom:4}}>🚧 Coming Soon</div>
        <div style={{fontSize:12,color:C.textLight,lineHeight:1.6}}>Full translation is in progress. Finnish (Suomi) will be the first language added after English.</div>
      </GCard>
    </div>
  );
};

/* ══ HELP & SUPPORT SCREEN ══ */
const HelpScreen=({onBack,user})=>{
  const T=getLang(user);

/* ══ ADMIN DASHBOARD ══ */
const ADMIN_PASSWORD = "pain2care_admin_2024";

const AdminDashboard = () => {
  const [authed, setAuthed] = useState(false);
  const [pw, setPw] = useState("");
  const [pwError, setPwError] = useState("");
  const [users, setUsers] = useState([]);
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("overview"); // overview | users | revenue | codes

  const login = () => {
    if (pw === ADMIN_PASSWORD) { setAuthed(true); loadData(); }
    else { setPwError("Wrong password"); }
  };

  const loadData = async () => {
    setLoading(true);
    // Load from localStorage
    try {
      const lu = JSON.parse(localStorage.getItem("p2c_users") || "[]");
      setUsers(lu);
    } catch(e) {}
    // Load subscriptions from Firebase
    if (window._fbReady && fbDb && fbRef && fbOnVal) {
      try {
        fbOnVal(fbRef(fbDb, "subscriptions"), snap => {
          const data = snap.val() || {};
          setSubs(Object.values(data).sort((a,b) => b.subscribedAt - a.subscribedAt));
        });
        fbOnVal(fbRef(fbDb, "users"), snap => {
          const data = snap.val() || {};
          setUsers(Object.values(data));
        });
      } catch(e) {}
    }
    setLoading(false);
  };

  const planPrice = {normal_monthly:2.99, normal_annual:29.99, premium_monthly:4.99, premium_annual:49.99};
  const planLabel = {normal_monthly:"Normal Monthly", normal_annual:"Normal Annual", premium_monthly:"Premium Monthly", premium_annual:"Premium Annual", trial:"Free Trial"};
  const planColor = {normal_monthly:C.blue, normal_annual:C.blue, premium_monthly:C.gold, premium_annual:C.gold, trial:C.textLight};

  const paidSubs = subs.filter(s => s.plan && s.plan !== "trial");
  const totalRevenue = paidSubs.reduce((a,b) => a + (b.revenue||0), 0);
  const mrr = paidSubs.filter(s=>s.plan?.includes("monthly")).reduce((a,b)=>a+(b.revenue||0),0)
             + paidSubs.filter(s=>s.plan?.includes("annual")).reduce((a,b)=>a+(b.revenue||0),0)/12;
  const discountUsed = paidSubs.filter(s=>s.discountCode).length;
  const normalCount = paidSubs.filter(s=>s.plan?.startsWith("normal")).length;
  const premiumCount = paidSubs.filter(s=>s.plan?.startsWith("premium")).length;
  const trialUsers = users.filter(u=>u.plan==="trial"||!u.plan).length;

  const DISCOUNT_CODES_LIST = ["PAIN10","HEAL10","CARE10","P2C2024","WELCOME10","CHRONIC10","RELIEF10","HEALTH10","SUPPORT10","RECOVER10"];

  if (!authed) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0d2a3f,#1a4060)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"rgba(255,255,255,0.05)",borderRadius:20,padding:32,width:"100%",maxWidth:360,border:"1px solid rgba(255,255,255,0.1)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:32,marginBottom:8}}>🔐</div>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:20,fontWeight:800,color:"#fff"}}>Admin Dashboard</div>
          <div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:4}}>Pain2Care · Internal</div>
        </div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}
          placeholder="Admin password" style={{width:"100%",padding:"12px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.08)",color:"#fff",fontSize:14,boxSizing:"border-box",outline:"none",marginBottom:10}}/>
        {pwError && <div style={{fontSize:12,color:"#ff6877",marginBottom:8}}>⚠️ {pwError}</div>}
        <button onClick={login} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#1a6fa0,#0e4f78)",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>
          Sign In →
        </button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:"'Nunito',sans-serif"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0d2a3f,#1a4060)",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{fontSize:22}}>📊</div>
          <div>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:16,fontWeight:800,color:"#fff"}}>Pain2Care Admin</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)"}}>Dashboard · {new Date().toLocaleDateString()}</div>
          </div>
        </div>
        <button onClick={()=>{setAuthed(false);setPw("");}} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"6px 14px",color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer"}}>
          Sign Out
        </button>
      </div>

      {/* Tab nav */}
      <div style={{background:"#fff",borderBottom:"1px solid #e0eaf0",display:"flex",gap:0,padding:"0 24px"}}>
        {[{id:"overview",label:"📈 Overview"},{id:"users",label:"👥 Users"},{id:"revenue",label:"💰 Revenue"},{id:"codes",label:"🏷️ Discount Codes"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{padding:"14px 18px",border:"none",borderBottom:tab===t.id?"3px solid #1a6fa0":"3px solid transparent",background:"transparent",fontWeight:tab===t.id?800:600,fontSize:13,color:tab===t.id?C.blue:C.textLight,cursor:"pointer",transition:"all 0.15s"}}>
            {t.label}
          </button>
        ))}
        <button onClick={loadData} style={{marginLeft:"auto",padding:"10px 14px",background:"none",border:"none",fontSize:12,color:C.textLight,cursor:"pointer"}}>🔄 Refresh</button>
      </div>

      <div style={{padding:24,maxWidth:1100,margin:"0 auto"}}>

        {/* OVERVIEW */}
        {tab==="overview" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:24}}>
              {[
                {label:"Total Users",value:users.length,icon:"👥",color:C.blue},
                {label:"Paid Subscribers",value:paidSubs.length,icon:"💳",color:C.green},
                {label:"Free Trial",value:trialUsers,icon:"⏳",color:C.gold},
                {label:"Total Revenue",value:"€"+totalRevenue.toFixed(2),icon:"💰",color:"#16a34a"},
                {label:"Est. MRR",value:"€"+mrr.toFixed(2),icon:"📈",color:C.blue},
                {label:"Discount Used",value:discountUsed,icon:"🏷️",color:C.purple},
              ].map(stat=>(
                <div key={stat.label} style={{background:"#fff",borderRadius:14,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em"}}>{stat.label}</div>
                    <span style={{fontSize:20}}>{stat.icon}</span>
                  </div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:28,fontWeight:800,color:stat.color}}>{stat.value}</div>
                </div>
              ))}
            </div>

            {/* Plan breakdown */}
            <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7",marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark,marginBottom:16}}>Plan Breakdown</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
                {Object.entries(
                  paidSubs.reduce((acc,s)=>{acc[s.plan]=(acc[s.plan]||0)+1;return acc;},{})
                ).map(([plan,count])=>(
                  <div key={plan} style={{background:"#f8fafc",borderRadius:10,padding:"12px 14px",border:`1px solid ${planColor[plan]||C.blue}30`}}>
                    <div style={{fontSize:11,color:planColor[plan]||C.blue,fontWeight:700}}>{planLabel[plan]||plan}</div>
                    <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:800,color:C.textDark,marginTop:4}}>{count}</div>
                    <div style={{fontSize:11,color:C.textLight}}>€{(count*(planPrice[plan]||0)).toFixed(2)} total</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Recent subscriptions */}
            <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark,marginBottom:16}}>Recent Subscriptions</div>
              {paidSubs.slice(0,8).map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<7?"1px solid #f0f4f8":"none"}}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:`${planColor[s.plan]||C.blue}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>
                    {s.plan?.startsWith("premium")?"⭐":"💙"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.textDark}}>{s.name||s.email||"User"}</div>
                    <div style={{fontSize:11,color:C.textLight}}>{s.email} · {new Date(s.subscribedAt).toLocaleDateString()}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:12,fontWeight:700,color:planColor[s.plan]||C.blue}}>{planLabel[s.plan]||s.plan}</div>
                    <div style={{fontSize:12,color:C.green,fontWeight:700}}>€{s.revenue?.toFixed(2)||"—"}</div>
                  </div>
                  {s.discountCode&&<div style={{fontSize:10,background:"rgba(26,160,100,0.1)",color:"#1a8a50",padding:"2px 8px",borderRadius:50,fontWeight:700}}>{s.discountCode}</div>}
                </div>
              ))}
              {paidSubs.length===0&&<div style={{textAlign:"center",color:C.textLight,padding:24,fontSize:13}}>No subscriptions yet</div>}
            </div>
          </div>
        )}

        {/* USERS */}
        {tab==="users" && (
          <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark}}>All Users ({users.length})</div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#f8fafc"}}>
                    {["Name","Email","Plan","Trial Start","Gender","Silhouette"].map(h=>(
                      <th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:700,color:C.textLight,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #e8f0f7"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u,i)=>(
                    <tr key={i} style={{borderBottom:"1px solid #f4f8fc"}}>
                      <td style={{padding:"10px 12px",fontWeight:600,color:C.textDark}}>{u.name||"—"}</td>
                      <td style={{padding:"10px 12px",color:C.textLight}}>{u.email||"—"}</td>
                      <td style={{padding:"10px 12px"}}>
                        <span style={{fontSize:11,fontWeight:700,color:planColor[u.plan]||C.textLight,background:`${planColor[u.plan]||"#999"}15`,padding:"3px 8px",borderRadius:50}}>
                          {planLabel[u.plan]||u.plan||"—"}
                        </span>
                      </td>
                      <td style={{padding:"10px 12px",color:C.textLight,fontSize:12}}>{u.trialStart?new Date(u.trialStart).toLocaleDateString():"—"}</td>
                      <td style={{padding:"10px 12px",color:C.textLight}}>{u.gender||"—"}</td>
                      <td style={{padding:"10px 12px",color:C.textLight}}>{u.silhouette||"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {users.length===0&&<div style={{textAlign:"center",color:C.textLight,padding:24}}>No users found</div>}
            </div>
          </div>
        )}

        {/* REVENUE */}
        {tab==="revenue" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              {[
                {label:"Total Revenue",value:"€"+totalRevenue.toFixed(2),sub:"All time",color:C.green},
                {label:"Est. MRR",value:"€"+mrr.toFixed(2),sub:"Monthly recurring",color:C.blue},
                {label:"Normal Plan Revenue",value:"€"+paidSubs.filter(s=>s.plan?.startsWith("normal")).reduce((a,b)=>a+(b.revenue||0),0).toFixed(2),sub:`${normalCount} subscribers`,color:C.blue},
                {label:"Premium Plan Revenue",value:"€"+paidSubs.filter(s=>s.plan?.startsWith("premium")).reduce((a,b)=>a+(b.revenue||0),0).toFixed(2),sub:`${premiumCount} subscribers`,color:C.gold},
              ].map(s=>(
                <div key={s.label} style={{background:"#fff",borderRadius:14,padding:"18px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{s.label}</div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:32,fontWeight:800,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:12,color:C.textLight,marginTop:4}}>{s.sub}</div>
                </div>
              ))}
            </div>
            <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark,marginBottom:16}}>All Transactions</div>
              {subs.map((s,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:i<subs.length-1?"1px solid #f4f8fc":"none"}}>
                  <div style={{width:38,height:38,borderRadius:10,background:`${planColor[s.plan]||C.blue}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                    {s.plan?.startsWith("premium")?"⭐":"💙"}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:C.textDark}}>{s.name||"User"}</div>
                    <div style={{fontSize:11,color:C.textLight}}>{s.email} · {new Date(s.subscribedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:12,fontWeight:700,color:planColor[s.plan]||C.blue}}>{planLabel[s.plan]||s.plan}</div>
                    {s.discountCode&&<div style={{fontSize:10,color:"#1a8a50",fontWeight:700}}>🏷️ {s.discountCode} (-10%)</div>}
                  </div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:18,fontWeight:800,color:C.green,minWidth:60,textAlign:"right"}}>€{s.revenue?.toFixed(2)||"—"}</div>
                </div>
              ))}
              {subs.length===0&&<div style={{textAlign:"center",color:C.textLight,padding:24,fontSize:13}}>No transactions yet</div>}
            </div>
          </div>
        )}

        {/* DISCOUNT CODES */}
        {tab==="codes" && (()=>{
          const [codeFrom,setCodeFrom]=React.useState("");
          const [codeTo,setCodeTo]=React.useState("");
          const filteredSubs=subs.filter(s=>{
            if(!s.subscribedAt) return true;
            const d=new Date(s.subscribedAt);
            if(codeFrom && d < new Date(codeFrom)) return false;
            if(codeTo && d > new Date(codeTo+"T23:59:59")) return false;
            return true;
          });
          const filteredPaid=filteredSubs.filter(s=>s.plan&&s.plan!=="trial");
          const overallRevenue=filteredPaid.reduce((a,b)=>a+(b.revenue||0),0);
          const overallDiscount=filteredPaid.filter(s=>s.discountCode).reduce((a,b)=>a+(b.revenue||0)*0.1,0);
          const discountCount=filteredPaid.filter(s=>s.discountCode).length;
          return(
          <div>
            {/* Date filter */}
            <div style={{background:"#fff",borderRadius:14,padding:"16px 20px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7",marginBottom:16}}>

              <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <label style={{fontSize:11,fontWeight:700,color:C.textLight}}>FROM</label>
                  <input type="date" value={codeFrom} onChange={e=>setCodeFrom(e.target.value)}
                    style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d0e4f0",fontSize:13,color:C.textDark,background:"#f8fafc",outline:"none"}}/>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  <label style={{fontSize:11,fontWeight:700,color:C.textLight}}>TO</label>
                  <input type="date" value={codeTo} onChange={e=>setCodeTo(e.target.value)}
                    style={{padding:"8px 10px",borderRadius:8,border:"1px solid #d0e4f0",fontSize:13,color:C.textDark,background:"#f8fafc",outline:"none"}}/>
                </div>
                {(codeFrom||codeTo)&&<button onClick={()=>{setCodeFrom("");setCodeTo("");}}
                  style={{marginTop:18,padding:"8px 14px",borderRadius:8,border:"none",background:"rgba(230,57,70,0.1)",color:C.red,fontWeight:700,fontSize:12,cursor:"pointer"}}>
                  ✕ Clear
                </button>}
                <div style={{marginTop:18,fontSize:12,color:C.textLight}}>
                  {filteredPaid.length} transaction{filteredPaid.length!==1?"s":""} in range
                </div>
              </div>
            </div>
            {/* Overall Revenue Summary */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:16}}>
              {[
                {label:"Overall Revenue",value:"€"+overallRevenue.toFixed(2),icon:"💰",color:"#16a34a",sub:"gross in period"},
                {label:"Discount Revenue Lost",value:"-€"+overallDiscount.toFixed(2),icon:"🏷️",color:C.red,sub:`${discountCount} discounted orders`},
                {label:"Net Revenue",value:"€"+(overallRevenue).toFixed(2),icon:"📈",color:C.blue,sub:"after discount applied"},
                {label:"Avg Order Value",value:filteredPaid.length?"€"+(overallRevenue/filteredPaid.length).toFixed(2):"—",icon:"🧾",color:C.purple,sub:`${filteredPaid.length} orders`},
              ].map(s=>(
                <div key={s.label} style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.07em"}}>{s.label}</div>
                    <span style={{fontSize:18}}>{s.icon}</span>
                  </div>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:24,fontWeight:800,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:11,color:C.textLight,marginTop:3}}>{s.sub}</div>
                </div>
              ))}
            </div>
            {/* Code cards */}
            <div style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:"1px solid #e8f0f7"}}>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark,marginBottom:16}}>Discount Codes (10% off)</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
                {DISCOUNT_CODES_LIST.map(code=>{
                  const usages=filteredSubs.filter(s=>s.discountCode===code);
                  const revenue=usages.reduce((a,b)=>a+(b.revenue||0),0);
                  const saved=revenue*0.1;
                  return(
                    <div key={code} style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #e0eaf0"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                        <code style={{fontSize:14,fontWeight:800,color:C.blue,letterSpacing:"0.05em"}}>{code}</code>
                        <span style={{fontSize:11,background:"rgba(26,160,100,0.1)",color:"#1a8a50",padding:"2px 8px",borderRadius:50,fontWeight:700}}>10% OFF</span>
                      </div>
                      <div style={{fontSize:12,color:C.textLight}}>Used: <strong style={{color:C.textDark}}>{usages.length}×</strong></div>
                      <div style={{fontSize:12,color:C.textLight}}>Revenue: <strong style={{color:"#16a34a"}}>€{revenue.toFixed(2)}</strong></div>
                      <div style={{fontSize:12,color:C.textLight}}>Discount given: <strong style={{color:C.red}}>-€{saved.toFixed(2)}</strong></div>
                      <div style={{fontSize:11,color:C.textLight,marginTop:4}}>Valid: Normal & Premium · Monthly & Annual</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
          );
        })()}

      </div>
    </div>
  );
};

const MainApp=({user:initialUser,onLogout,onShowPaywall})=>{
  const [tab,setTab]=useState("home");
  const [history,setHistory]=useState(seedHistory);
  const [user,setUser]=useState(initialUser);
  const handleSetTab=(t)=>setTab(t);
  const handleUpdateUser=async(updated)=>{
    setUser(updated);
    // Save to session
    const sk=Object.keys(sessionStorage).find(k=>k.includes("p2c_session"));
    if(sk) sessionStorage.setItem(sk,JSON.stringify(updated));
    // Save to Firebase
    if(window._fbReady&&fbDb&&fbRef&&fbSet&&updated.uid){
      try{await fbSet(fbRef(fbDb,`users/${updated.uid}`),{name:updated.name,email:updated.email,dob:updated.dob||"",gender:updated.gender||"",silhouette:updated.silhouette,plan:updated.plan,trialStart:updated.trialStart});}catch(e){}
    }
  };
  const renderContent=()=>{
    switch(tab){
      case "home": return <HomeTab user={user} onModuleSelect={setTab} onShowPaywall={onShowPaywall} history={history}/>;
      case "pain": return <PainModule user={user} history={history} setHistory={setHistory} onShowPaywall={onShowPaywall} onBack={()=>setTab("home")}/>;
      case "pain-trends": return <PainModule user={user} history={history} setHistory={setHistory} onShowPaywall={onShowPaywall} onBack={()=>setTab("home")} initialTab="trends"/>;
      case "violence": return <ViolenceModule user={user} onShowPaywall={onShowPaywall} onBack={()=>setTab("home")}/>;
      case "trauma": return <TraumaModule user={user} onBack={()=>setTab("home")}/>;
      case "community": return <CommunityModule user={user} onBack={()=>setTab("home")}/>;
      case "trends": return <TrendsTab history={history} onBack={()=>setTab("home")} user={user}/>;
      case "profile": return <ProfileTab user={user} onLogout={onLogout} onShowPaywall={onShowPaywall} onUpdateUser={handleUpdateUser} onBack={()=>setTab("home")}/>;
      default: return <HomeTab user={user} onModuleSelect={setTab} onShowPaywall={onShowPaywall} history={history}/>;
    }
  };
  const navTab=["home","pain","pain-trends","violence","trauma","community","profile"].includes(tab)?(tab==="pain-trends"?"pain":tab):"home";
  return(
    <AppShell tab={navTab} setTab={handleSetTab} user={user} onLogout={onLogout}>
      {renderContent()}
    </AppShell>
  );
};

/* ══ ROOT ══ */
function App(){
  const [step,setStep]=useState("loading");
  const [user,setUser]=useState(null);
  const [vData,setVData]=useState(null);

  useEffect(()=>{
    // Wait for Firebase then listen to auth state
    const tryFb=()=>{
      if(window._fbReady&&fbOnAuth){
        fbOnAuth(fbAuth,async(fbUser)=>{
          if(fbUser){
            // Logged in — load profile from DB
            try{
              const snap=await new Promise(res=>fbOnVal(fbRef(fbDb,`users/${fbUser.uid}`),res,{onlyOnce:true}));
              const profile=snap.val()||{};
              const u={uid:fbUser.uid,email:fbUser.email,name:profile.name||fbUser.email,silhouette:profile.silhouette||2,plan:profile.plan||"free",trialStart:profile.trialStart||Date.now()};
              setUser(u);
              setStep(profile.silhouette?"app":"silhouette");
            }catch(e){
              setUser({uid:fbUser.uid,email:fbUser.email,name:fbUser.email,silhouette:2,plan:"free",trialStart:Date.now()});
              setStep("app");
            }
          } else {
            // Not logged in — check localStorage fallback
            try{const s=sessionStorage.getItem("p2c_session");if(s){const u=JSON.parse(s);setUser(u);setStep("app");return;}}catch(e){}
            setStep("login");
          }
        });
      } else {
        // Firebase not ready yet — try localStorage
        try{const s=sessionStorage.getItem("p2c_session");if(s){const u=JSON.parse(s);setUser(u);setStep("app");return;}}catch(e){}
        setTimeout(tryFb,400);
        setTimeout(()=>{if(step==="loading")setStep("login");},3000);
      }
    };
    tryFb();
  },[]);

  const saveUserToDb=async(uid,data)=>{
    if(fbDb&&fbRef&&fbSet){
      try{await fbSet(fbRef(fbDb,`users/${uid}`),data);}catch(e){}
    }
  };

  const handleLogin=async(u)=>{
    setUser(u);
    sessionStorage.setItem("p2c_session",JSON.stringify(u));
    const paid=["normal_monthly","normal_annual","premium_monthly","premium_annual"].includes(u.plan);
    const d=Math.max(0,5-Math.floor((Date.now()-(u.trialStart||Date.now()))/86400000));
    setStep(!paid&&d===0?"paywall":"app");
  };

  const handleReg=({email,code,name})=>{ setVData({email,code,name}); setStep("verify"); };

  const handleVerified=async()=>{
    // Firebase user was created in RegisterScreen — now load profile
    try{
      const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");
      const u=users.find(u=>u.email===vData.email);
      if(u){setUser(u);sessionStorage.setItem("p2c_session",JSON.stringify(u));}
    }catch(e){}
    setStep("silhouette");
  };

  const handleSil=async(sel)=>{
    const updated={...user,silhouette:sel};
    setUser(updated);
    sessionStorage.setItem("p2c_session",JSON.stringify(updated));
    if(updated.uid) await saveUserToDb(updated.uid,{name:updated.name,email:updated.email,silhouette:sel,plan:updated.plan||"free",trialStart:updated.trialStart||Date.now()});
    // localStorage fallback
    try{const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");const idx=users.findIndex(u=>u.email===updated.email);if(idx>=0){users[idx].silhouette=sel;localStorage.setItem("p2c_users",JSON.stringify(users));}}catch(e){}
    setStep("welcome");
  };

  const handleLogout=async()=>{
    sessionStorage.removeItem("p2c_session");
    try{if(fbAuth&&fbSignOut)await fbSignOut(fbAuth);}catch(e){}
    setUser(null);setStep("login");
  };

  const handleSub=(plan,discountCode)=>{
    const u={...user,plan};
    setUser(u);
    sessionStorage.setItem("p2c_session",JSON.stringify(u));
    if(u.uid){
      saveUserToDb(u.uid,{...u});
      // Save subscription event for admin analytics
      if(fbDb&&fbRef&&fbSet&&plan!=="trial"){
        const subEvent={
          uid:u.uid, name:u.name||"", email:u.email||"",
          plan, discountCode:discountCode||null,
          subscribedAt:Date.now(),
          revenue:plan==="normal_monthly"?2.99:plan==="normal_annual"?29.99:plan==="premium_monthly"?4.99:49.99,
        };
        try{fbSet(fbRef(fbDb,`subscriptions/${u.uid}_${Date.now()}`),subEvent);}catch(e){}
      }
    }
    setStep("app");
  };

  if(step==="loading") return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:26,color:"#1a6fa0"}}>
        <span style={{color:"#e63946"}}>Pain</span><span>2</span><span style={{color:"#1a8c7a"}}>Care</span>
      </div>
      <div style={{width:36,height:36,border:"3px solid rgba(26,111,160,0.15)",borderTop:"3px solid #1a6fa0",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
  if(step==="login") return<AuthShell><LoginScreen onLogin={handleLogin} onGoRegister={()=>setStep("register")}/></AuthShell>;
  if(step==="register") return<AuthShell><RegisterScreen onGoLogin={()=>setStep("login")} onRegistered={handleReg}/></AuthShell>;
  if(step==="verify") return<AuthShell><VerifyScreen email={vData?.email} code={vData?.code} onVerified={handleVerified} onBack={()=>setStep("register")}/></AuthShell>;
  if(step==="silhouette") return<SilhouetteScreen onContinue={handleSil}/>;
  if(step==="welcome") return<WelcomeScreen user={user} onContinue={()=>setStep("app")}/>;
  if(step==="paywall") return<PaywallScreen user={user} onSubscribe={handleSub} onLogout={handleLogout}/>;
  if(step==="app") return<MainApp user={user} onLogout={handleLogout} onShowPaywall={()=>setStep("paywall")}/>;
  return null;
}
const checkAdmin = () => {
  const hash = window.location.hash;
  const search = window.location.search;
  const path = window.location.pathname;
  return hash === "#admin" || hash === "#/admin" || 
         search.includes("admin=1") || search.includes("admin") ||
         path.includes("/admin") ||
         localStorage.getItem("p2c_admin_mode") === "1";
};
ReactDOM.createRoot(document.getElementById("root")).render(checkAdmin() ? <AdminDashboard/> : <App/>);
</script>

<script>
window.generatePDF = function(activeDoc, lastShare) {
  try {
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
    var pw = 210;
    var margin = 20;
    var cw = pw - margin * 2;

    // Header bar
    doc.setFillColor(123, 63, 158);
    doc.rect(0, 0, pw, 28, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('Pain2Care', margin, 18);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text('Incident Documentation Report', margin + 42, 18);
    doc.text('CONFIDENTIAL', pw - margin, 18, 'right');

    // Generated info
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(9);
    var genDate = new Date().toLocaleString('en-FI', {dateStyle:'long', timeStyle:'short'});
    doc.text('Generated: ' + genDate, margin, 36);
    doc.text('Prepared for: ' + ((lastShare && lastShare.recipient) || 'Recipient'), margin, 42);

    // Divider
    doc.setDrawColor(123, 63, 158);
    doc.setLineWidth(0.5);
    doc.line(margin, 46, pw - margin, 46);

    // Incident details
    var y = 55;
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('Incident Details', margin, y);
    y += 8;

    var fields = [
      ['TYPE OF INCIDENT', activeDoc.type || '-'],
      ['DATE', activeDoc.date || '-'],
      ['LOCATION', activeDoc.location || '-'],
      ['WITNESSES', activeDoc.witnesses || '-'],
    ];

    fields.forEach(function(f) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(100, 100, 100);
      doc.text(f[0], margin, y);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(30, 30, 30);
      doc.setFontSize(11);
      doc.text(String(f[1]), margin, y + 6);
      y += 16;
    });

    // Description
    y += 4;
    doc.setDrawColor(220, 220, 220);
    doc.line(margin, y, pw - margin, y);
    y += 8;
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(30, 30, 30);
    doc.text('Description', margin, y);
    y += 8;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(11);
    doc.setTextColor(50, 50, 50);
    var descLines = doc.splitTextToSize(activeDoc.desc || 'No description provided.', cw);
    doc.text(descLines, margin, y);
    y += descLines.length * 6 + 10;

    // Sharing history
    if (activeDoc.shareLog && activeDoc.shareLog.length > 0) {
      doc.line(margin, y, pw - margin, y);
      y += 8;
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(30, 30, 30);
      doc.text('Sharing History', margin, y);
      y += 8;
      activeDoc.shareLog.forEach(function(log) {
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(60, 60, 60);
        doc.text('Shared with ' + log.recipient + ' - ' + log.date, margin, y);
        y += 7;
      });
    }

    // Footer
    doc.setFillColor(245, 245, 250);
    doc.rect(0, 272, pw, 25, 'F');
    doc.setTextColor(120, 120, 120);
    doc.setFontSize(8);
    doc.text('Generated by Pain2Care - www.pain2care.com', margin, 282);
    doc.text('Confidential - intended solely for the named recipient.', margin, 288);
    doc.text('ID: ' + activeDoc.id, pw - margin, 282, 'right');

    var fileName = 'Pain2Care_Report_' + (activeDoc.type || 'Incident').replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.pdf';
    doc.save(fileName);
  } catch(e) {
    alert('PDF error: ' + e.message);
  }
};
</script>
