const MiniChart=({data,color,maxVal,height=120,filled=false,yLabel=""})=>{
  const W=320,H=height,padX=28,padY=16,pts=data.length;
  if(!pts||pts<2) return null;
  const xs=data.map((_,i)=>padX+(i/(pts-1))*(W-padX-8));
  const ys=data.map(d=>padY+((maxVal-d.v)/(maxVal))*(H-padY*2));
  const line=xs.map((x,i)=>`${i===0?"M":"L"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=line+` L${xs[pts-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
  const gid="g"+color.replace(/[^a-z0-9]/gi,"");
  const yTicks=[0,Math.round(maxVal/2),maxVal];
  return(
    <svg viewBox={`0 0 ${W} ${H+22}`} width="100%" style={{display:"block"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      {/* Y axis gridlines + labels */}
      {yTicks.map(tick=>{
        const y=padY+((maxVal-tick)/maxVal)*(H-padY*2);
        return(
          <g key={tick}>
            <line x1={padX} y1={y} x2={W-8} y2={y} stroke="rgba(26,111,160,0.08)" strokeWidth="1" strokeDasharray="3,3"/>
            <text x={padX-4} y={y+4} textAnchor="end" fontSize="9" fill="#6b95ad">{tick}</text>
          </g>
        );
      })}
      {/* Y axis line */}
      <line x1={padX} y1={padY} x2={padX} y2={H} stroke="rgba(26,111,160,0.15)" strokeWidth="1"/>
      {filled&&<path d={area} fill={`url(#${gid})`}/>}
      <path d={line} stroke={color} strokeWidth="2.5" fill="none" strokeLinejoin="round" strokeLinecap="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={xs[i]} cy={ys[i]} r="4" fill={color}/>
          <text x={xs[i]} y={H+16} textAnchor="middle" fontSize="9" fill="#6b95ad">{d.day}</text>
        </g>
      ))}
    </svg>
  );
};

const filterByGender = (items, gender) => {
  const maleOnly = ['penis','scrotum','testicle','testis','prostate','epididymis'];
  const femaleOnly = ['vulva','vagina','clitoris','labia','uterus','ovary','ovaries','cervix','fallopian'];
  const g = (gender||'').toLowerCase();
  return items.filter(item => {
    const t = item.toLowerCase();
    const isMale = maleOnly.some(w => t.includes(w));
    const isFemale = femaleOnly.some(w => t.includes(w));
    if (isMale && g === 'female') return false;
    if (isFemale && g === 'male') return false;
    return true;
  });
};

const mkColor = (areaSymptoms) => (id) => {
  const d = areaSymptoms[id];
  if (!d || !d.maxIntensity) return '#F5CBA7';
  if (d.maxIntensity >= 7) return '#e63946';
  if (d.maxIntensity >= 4) return '#e65100';
  return '#f9a825';
};
const mkStroke = (areaSymptoms) => (id) => {
  const d = areaSymptoms[id];
  if (!d || !d.maxIntensity) return '#d4956a';
  if (d.maxIntensity >= 7) return '#b71c1c';
  if (d.maxIntensity >= 4) return '#bf360c';
  return '#e65100';
};

// ── FRONT FIGURE ─────────────────────────────────────────────
const FigureFront = ({ areaSymptoms, onAreaClick }) => {
  const gc = mkColor(areaSymptoms);
  const gs = mkStroke(areaSymptoms);
  const sw = 1.5;
  const hit = (id) => ({ onClick: () => onAreaClick(id), style: { cursor: 'pointer' } });
  return (
    <svg viewBox="0 0 160 340" width="100%" style={{maxWidth:200,display:'block',margin:'0 auto'}}>
      {/* HEAD */}
      <ellipse cx="80" cy="26" rx="22" ry="24" fill={gc('forehead')} stroke={gs('forehead')} strokeWidth={sw} {...hit('forehead')}/>
      {/* Face details */}
      <circle cx="73" cy="24" r="3" fill="#c07850" opacity="0.6"/>
      <circle cx="87" cy="24" r="3" fill="#c07850" opacity="0.6"/>

// Mirror helper: swaps l↔r prefix in area IDs so clicking FigureLeft on "right" tab gives correct side
const mirrorId = (id) => {
  if(id.startsWith('l')) return 'r'+id.slice(1);
  if(id.startsWith('r')) return 'l'+id.slice(1);
  return id;
};

const ALL_AREAS = [...AREAS_BY_SIDE.front,...AREAS_BY_SIDE.back,...AREAS_BY_SIDE.left,...AREAS_BY_SIDE.right];

const BodyMapV2 = ({ user, areaSymptoms, onSave, bodyType = 'normal' }) => {
  const T=getLang(user);
  const gender = user?.gender || '';
  const [side, setSide] = React.useState('front');
  const [mainTab, setMainTab] = React.useState('map'); // 'map' | 'list'
  const [phase, setPhase] = React.useState(1); // 1=map, 2=detail
  const [activeArea, setActiveArea] = React.useState(null);
  const [tempSubs, setTempSubs] = React.useState({});
  const [tempSwell, setTempSwell] = React.useState({});
  const [tempNumb, setTempNumb] = React.useState({});
  const [customAreas, setCustomAreas] = React.useState(loadCustomV2);
  const [customInput, setCustomInput] = React.useState('');

  const getSubareas = (areaId) => {
    const base = filterByGender(SUBAREAS_V2[areaId] || [], gender);
    const custom = customAreas[areaId] || [];
    return [...base, ...custom];
  };

  const openArea = (areaId) => {
    const areaInfo = ALL_AREAS.find(a => a.id === areaId) || {id: areaId, label: areaId};
    const saved = areaSymptoms[areaId] || {};
    setTempSubs({...(saved.subareas||{})});
    setTempSwell({...(saved.swelling||{})});
    setTempNumb({...(saved.numbness||{})});
    setActiveArea(areaInfo);
    setPhase(2);
  };

  const saveArea = () => {
    const hasSubs = Object.keys(tempSubs).some(k => tempSubs[k] > 0);
    if (!hasSubs) {
      const next = {...areaSymptoms};
      delete next[activeArea.id];
      onSave(next);
    } else {
      const vals = Object.values(tempSubs).filter(v => v > 0);
      const maxI = vals.length ? Math.max(...vals) : 0;
      const col = maxI >= 7 ? 3 : maxI >= 4 ? 2 : maxI > 0 ? 1 : 0;
      onSave({...areaSymptoms, [activeArea.id]: {
        label: activeArea.label,
        subareas: {...tempSubs},
        swelling: {...tempSwell},
        numbness: {...tempNumb},
        maxIntensity: maxI,
        colorLevel: col,
        hasSwelling: Object.values(tempSwell).some(v => v === 'yes'),
        hasNumbness: Object.values(tempNumb).some(v => v === 'yes'),
      }});
    }
    setPhase(1);
    setActiveArea(null);
  };

  const addCustom = () => {
    const val = customInput.trim();
    if (!val || !activeArea) return;
    const rid = activeArea.id;
    const updated = {...customAreas, [rid]: [...(customAreas[rid]||[]).filter(x=>x!==val), val]};
    setCustomAreas(updated);
    saveCustomV2(updated);
    setCustomInput('');
  };

  // ── PHASE 2: DETAIL VIEW ─────────────────────────────────
  if (phase === 2 && activeArea) {
    const subs = getSubareas(activeArea.id);
    const activeSubs = Object.keys(tempSubs).filter(k => tempSubs[k] > 0);
    return (
      <div style={{animation:'fadeIn 0.2s ease both'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
          <button onClick={()=>{setPhase(1);setActiveArea(null);}}
            style={{background:'rgba(26,111,160,0.1)',border:'none',borderRadius:50,width:36,height:36,fontSize:18,cursor:'pointer',color:C.blue,display:'flex',alignItems:'center',justifyContent:'center'}}>←</button>
          <div>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:16,color:C.textDark}}>{activeArea.label}</div>
            <div style={{fontSize:11,color:C.textLight}}>{T.setIntensity}</div>
          </div>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:12}}>
          {subs.map(name => {
            const intensity = tempSubs[name] || 0;
            const sw = tempSwell[name] || '';
            const nu = tempNumb[name] || '';
            const isCustom = (customAreas[activeArea.id]||[]).includes(name);
            const bgColor = intensity === 0 ? 'rgba(255,255,255,0.55)' :
              intensity <= 3 ? 'rgba(255,230,50,0.2)' :
              intensity <= 6 ? 'rgba(255,140,0,0.15)' : 'rgba(240,60,50,0.13)';
            const borderColor = intensity === 0 ? 'transparent' :
              intensity <= 3 ? '#f9a825' : intensity <= 6 ? '#e65100' : '#b71c1c';
            return (
              <div key={name} style={{background:bgColor,border:`2px solid ${borderColor}`,borderRadius:14,padding:'12px 14px',transition:'all 0.2s'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:intensity>0?8:0}}>
                  <span style={{fontSize:13,fontWeight:700,color:C.textDark}}>
                    {name}{isCustom && <span style={{fontSize:10,color:C.blue,marginLeft:5}}>{T.custom}</span>}
                  </span>
                  <span style={{fontSize:11,color:C.textLight,minWidth:58,textAlign:'right'}}>
                    {intensity===0?'':intensity<=3?'Mild':intensity<=6?'Moderate':intensity<=8?'Severe':'Worst'}
                  </span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:intensity>0?10:0}}>
                  <span style={{fontSize:12}}>😌</span>
                  <input type="range" min={0} max={10} value={intensity}
                    onChange={e=>{const v=Number(e.target.value);setTempSubs(p=>({...p,[name]:v}));}}
                    style={{flex:1,accentColor:intensity<=3?'#f9a825':intensity<=6?'#e65100':'#b71c1c'}}/>
                  <span style={{fontSize:12}}>😭</span>
                  <span style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:16,color:C.textDark,minWidth:20}}>{intensity}</span>
                </div>
                {intensity > 0 && (
                  <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                    {[['swelling',T.swelling,sw,setTempSwell],['numbness',T.numbness,nu,setTempNumb]].map(([type,label,val,setter])=>(
                      <div key={type} style={{display:'flex',alignItems:'center',gap:0,borderRadius:50,overflow:'hidden',border:'1.5px solid rgba(107,149,173,0.3)',background:'rgba(255,255,255,0.4)'}}>
                        <span style={{fontSize:11,fontWeight:700,color:'#3d5a6e',padding:'5px 9px',borderRight:'1.5px solid rgba(107,149,173,0.2)',whiteSpace:'nowrap'}}>{label}</span>
                        {[T.yes,T.no].map(opt=>{
                          const isOn = val===(opt===T.yes?'yes':'no');
                          return(
                            <button key={opt} onClick={()=>setter(p=>({...p,[name]:opt===T.yes?'yes':'no'}))}
                              style={{padding:'5px 11px',fontSize:11,fontWeight:800,border:'none',cursor:'pointer',
                                background:isOn?(opt===T.yes?'#1976d2':'rgba(107,149,173,0.2)'):'transparent',
                                color:isOn?(opt===T.yes?'white':'#3d5a6e'):'#6b95ad',
                                fontFamily:"'Nunito',sans-serif",transition:'all 0.15s'}}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Custom area input */}
        <div style={{display:'flex',gap:8,alignItems:'center',padding:'11px 13px',background:'rgba(26,111,160,0.04)',border:'2px dashed rgba(26,111,160,0.2)',borderRadius:14,marginBottom:16}}>
          <input value={customInput} onChange={e=>setCustomInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addCustom()}
            placeholder="Add custom sub-area..."
            style={{flex:1,border:'none',background:'transparent',fontFamily:"'Nunito',sans-serif",fontSize:13,fontWeight:600,color:C.textDark,outline:'none'}}/>
          <button onClick={addCustom}
            style={{background:C.blue,color:'white',border:'none',padding:'7px 13px',borderRadius:50,fontFamily:"'Nunito',sans-serif",fontSize:12,fontWeight:800,cursor:'pointer'}}>
            + Add
          </button>
        </div>

        <button onClick={saveArea}
          style={{width:'100%',background:`linear-gradient(135deg,${C.blue},#0e4f78)`,color:'white',border:'none',padding:'15px',borderRadius:50,fontFamily:"'Nunito',sans-serif",fontSize:16,fontWeight:800,cursor:'pointer',boxShadow:'0 6px 20px rgba(26,111,160,0.3)'}}>
          {activeSubs.length > 0 ? `Save ${activeSubs.length} sub-area${activeSubs.length!==1?'s':''}` : 'Clear & Close'}
        </button>
      </div>
    );
  }

  // ── PHASE 1: MAIN VIEW ───────────────────────────────────
  const activeAreaCount = Object.keys(areaSymptoms).filter(k => areaSymptoms[k]?.maxIntensity > 0).length;
  const currentAreas = AREAS_BY_SIDE[side] || AREAS_BY_SIDE.front;

  return (
    <div>
      {/* Header */}
      <div style={{textAlign:'center',marginBottom:14}}>
        <div style={{fontSize:20,fontFamily:"'Montserrat',sans-serif",fontWeight:800,color:C.textDark}}>
          🩺 Where does it hurt?
        </div>
        <div style={{fontSize:12,color:C.textLight,marginTop:2}}>
          {mainTab==='map' ? 'Tap a body area to specify it' : 'Select an area from the list'}
        </div>
      </div>

      {/* Select area / Specify location tabs */}
      <div style={{display:'flex',gap:0,marginBottom:14,background:'rgba(26,111,160,0.08)',borderRadius:50,padding:3}}>
        {[['map','① Select area'],['list','② Specify location']].map(([t,lbl])=>(
          <button key={t} onClick={()=>setMainTab(t)}
            style={{flex:1,padding:'8px 0',borderRadius:50,border:'none',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:12,cursor:'pointer',
              background:mainTab===t?'rgba(26,111,160,0.9)':'transparent',
              color:mainTab===t?'#fff':'#6b95ad',transition:'all 0.2s'}}>
            {lbl}
          </button>
        ))}
      </div>

      {mainTab === 'map' && (
        <>
          {/* 4-view toggle with arrows */}
          <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:12,background:'rgba(26,111,160,0.06)',borderRadius:50,padding:'4px 6px'}}>
            {[['front','● Front',null],['left','◄ Left',null],['back','● Back',null],['right','Right ►',null]].map(([s,lbl])=>(
              <button key={s} onClick={()=>setSide(s)}
                style={{flex:1,padding:'7px 4px',borderRadius:50,border:'none',fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:11,cursor:'pointer',
                  background:side===s?'rgba(26,111,160,0.9)':'transparent',
                  color:side===s?'#fff':'#6b95ad',transition:'all 0.2s',whiteSpace:'nowrap'}}>
                {lbl}
              </button>
            ))}
          </div>

          {/* Figure */}
          <div style={{background:'rgba(255,255,255,0.4)',borderRadius:18,padding:'16px 8px',marginBottom:10,minHeight:200}}>
            <div style={{fontSize:11,color:C.textLight,textAlign:'center',marginBottom:8}}>{T.tapToSelect}</div>
            {side==='front' && <FigureFront areaSymptoms={areaSymptoms} onAreaClick={openArea}/>}
            {side==='back' && <FigureBack areaSymptoms={areaSymptoms} onAreaClick={openArea}/>}
            {side==='left' && <FigureRight areaSymptoms={areaSymptoms} onAreaClick={(id)=>{let r=id.startsWith('r')?'l'+id.slice(1):id.startsWith('l')?'r'+id.slice(1):id;r=r.endsWith('_r')?r.slice(0,-2)+'_l':r.endsWith('_l')?r.slice(0,-2)+'_r':r;openArea(r);}}/>}
            {side==='right' && <FigureLeft areaSymptoms={areaSymptoms} onAreaClick={(id)=>{let r=id.startsWith('l')?'r'+id.slice(1):id.startsWith('r')?'l'+id.slice(1):id;r=r.endsWith('_l')?r.slice(0,-2)+'_r':r.endsWith('_r')?r.slice(0,-2)+'_l':r;openArea(r);}}/>}
          </div>
        </>
      )}

      {mainTab === 'list' && (
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:10}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:4}}>Current view: <strong>{side}</strong> — or tap any area:</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {currentAreas.map(area => {
              const d = areaSymptoms[area.id];
              const active = d?.maxIntensity > 0;
              const col = active ? (d.colorLevel>=3?C.red:d.colorLevel>=2?'#e65100':'#b37a00') : C.blue;
              const bg = active ? (d.colorLevel>=3?'rgba(230,57,70,0.12)':d.colorLevel>=2?'rgba(230,81,0,0.12)':'rgba(249,168,37,0.15)') : 'rgba(26,111,160,0.06)';
              return (
                <button key={area.id} onClick={()=>openArea(area.id)}
                  style={{padding:'7px 12px',borderRadius:50,border:`1.5px solid ${active?col:'rgba(26,111,160,0.2)'}`,background:bg,fontFamily:"'Nunito',sans-serif",fontWeight:700,fontSize:12,color:col,cursor:'pointer',transition:'all 0.15s'}}>
                  {area.label}{active ? ` ${d.maxIntensity}/10` : ''}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Pain locations summary */}
      <div style={{background:'rgba(255,255,255,0.5)',borderRadius:14,padding:'12px 14px'}}>
        <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:activeAreaCount>0?10:0}}>
          📍 Pain locations:{activeAreaCount===0 && <span style={{fontWeight:500,color:C.textLight,marginLeft:6,fontSize:12}}>None yet — tap body area above</span>}
        </div>
        {activeAreaCount > 0 && (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {Object.entries(areaSymptoms).filter(([,d])=>d?.maxIntensity>0).map(([rid,d])=>{
              const colorCls = d.colorLevel>=3?C.red:d.colorLevel>=2?'#e65100':d.colorLevel>=1?'#b37a00':C.textLight;
              const bgCls = d.colorLevel>=3?'rgba(240,60,50,0.09)':d.colorLevel>=2?'rgba(255,140,0,0.09)':'rgba(255,230,50,0.15)';
              const borderCls = d.colorLevel>=3?'rgba(183,28,28,0.25)':d.colorLevel>=2?'rgba(230,81,0,0.25)':'rgba(249,168,37,0.35)';
              const painAreas = Object.entries(d.subareas||{}).filter(([,v])=>v>0).map(([n,v])=>`${n} (${v}/10)`).join(', ');
              return (
                <div key={rid} onClick={()=>openArea(rid)}
                  style={{background:bgCls,border:`1.5px solid ${borderCls}`,borderRadius:12,padding:'10px 12px',cursor:'pointer',borderLeft:`4px solid ${colorCls}`}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:13,color:C.textDark}}>{d.label}</span>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:12,fontWeight:700,color:colorCls}}>Max {d.maxIntensity}/10</span>
                      <button onClick={e=>{e.stopPropagation();const n={...areaSymptoms};delete n[rid];onSave(n);}}
                        style={{background:'none',border:'none',fontSize:14,cursor:'pointer',color:'#6b95ad',padding:'0 2px'}}>✕</button>
                    </div>
                  </div>
                  {painAreas && <div style={{fontSize:11,color:'#4a6a80',fontWeight:600,marginBottom:6,lineHeight:1.5}}>📍 {painAreas}</div>}
                  <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    <span style={{fontSize:11,fontWeight:700,color:d.hasSwelling?'#1976d2':C.textLight}}>
                      Swelling: <span style={{color:d.hasSwelling?'#1976d2':'#999'}}>{d.hasSwelling?T.yes:T.no}</span>
                    </span>
                    <span style={{fontSize:11,fontWeight:700,color:d.hasNumbness?'#7b1fa2':C.textLight}}>
                      Numbness: <span style={{color:d.hasNumbness?'#7b1fa2':'#999'}}>{d.hasNumbness?T.yes:T.no}</span>
                    </span>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
};

const VerifyScreen=({email,code,onVerified,onBack})=>{
  const [input,setInput]=useState(["","","","","",""]);
  const [error,setError]=useState(""); const [loading,setLoading]=useState(false);
  const refs=useRef([]);
  const handleInput=(i,v)=>{if(!/^\d?$/.test(v))return;const n=[...input];n[i]=v;setInput(n);if(v&&i<5)refs.current[i+1]?.focus();};
  const handleKey=(i,e)=>{if(e.key==="Backspace"&&!input[i]&&i>0)refs.current[i-1]?.focus();};
  const verify=async()=>{
    const entered=input.join("");if(entered.length<6){setError("Enter all 6 digits");return;}
    setLoading(true); await new Promise(r=>setTimeout(r,700));
    if(entered===code){
      const users=JSON.parse(localStorage.getItem("p2c_users")||"[]");
      const idx=users.findIndex(u=>u.email===email);
      if(idx>=0){users[idx].verified=true;localStorage.setItem("p2c_users",JSON.stringify(users));}
      onVerified();
    } else {setError("Incorrect code. Try again.");}
    setLoading(false);
  };
  return(
    <div style={{animation:"fadeIn 0.5s ease both"}}>
      <div style={{marginBottom:18}}>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:20,fontWeight:800,color:C.textDark}}>Verify Your Email ✉️</div>

        💡 Demo mode — your code is: <strong>{code}</strong>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:18}}>
        {input.map((v,i)=>(
          <input key={i} ref={el=>refs.current[i]=el} value={v} maxLength={1}
            onChange={e=>handleInput(i,e.target.value)} onKeyDown={e=>handleKey(i,e)}
            style={{width:42,height:54,textAlign:"center",background:"rgba(255,255,255,0.7)",border:`2px solid ${v?C.blue:"rgba(26,111,160,0.2)"}`,borderRadius:13,color:C.textDark,fontFamily:"'Montserrat',sans-serif",fontSize:22,fontWeight:800,outline:"none"}}/>

};

    if(reminder) return;
    setReminderLoading(true);
    const last=history[history.length-1];
    const avg7=history.slice(-7).length>0?(history.slice(-7).reduce((a,b)=>a+b.painLevel,0)/history.slice(-7).length).toFixed(1):null;
    const trend=history.length>=2?(history[history.length-1].painLevel-history[history.length-2].painLevel):0;
    const mood=last?.mood||3;
    const prompt=`You are a compassionate chronic pain support companion. Generate ONE short, warm, personalized daily reminder (max 2 sentences) for a user based on their data:
- Last pain level: ${last?.painLevel??"-"}/10
- 7-day average pain: ${avg7??"-"}/10  
- Pain trend: ${trend>0?"worsening":trend<0?"improving":"stable"}
- Last mood: ${mood}/5
- Total check-ins: ${history.length}
Be empathetic, realistic and encouraging. Do NOT use generic platitudes. Tailor the message to their specific situation. Reply with ONLY the reminder text, no quotes or labels.`;
    const fallback=()=>{setReminder(AFFIRMATIONS[Math.floor(Date.now()/86400000)%AFFIRMATIONS.length]);setReminderLoading(false);};
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:100,messages:[{role:"user",content:prompt}]})
      });
      const d=await r.json();
      const text=d?.content?.[0]?.text?.trim();
      if(text){
        Object.keys(localStorage).filter(k=>k.startsWith("p2c_reminder_")&&k!==todayKey).forEach(k=>localStorage.removeItem(k));
        localStorage.setItem(todayKey,text);
        setReminder(text);
      } else { fallback(); }
    } catch(e){ fallback(); }
    setReminderLoading(false);
  })();},[]); 
  const modules=[
    {id:"pain",icon:"🩺",title:T.painModule,sub:T.chronicPain,color:C.red,border:"rgba(230,57,70,0.2)"},

          </div>

            {T.trialIncludesNormal}<br/>
            {T.premiumNotAvailable}

      <div style={{padding:"0 22px",marginBottom:18}}>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:21,fontWeight:800,color:C.textDark}}>Hello, {user?.name?.split(" ")[0]||"Friend"} 👋</div>

      <div className="glass" style={{margin:"0 18px 18px",borderRadius:17,padding:18,background:"rgba(26,111,160,0.07)",border:"1px solid rgba(26,111,160,0.15)"}}>

          :<div style={{fontSize:14,fontStyle:"italic",lineHeight:1.65,color:C.textMid}}>"{reminder||AFFIRMATIONS[0]}"</div>

      {history.length>0&&(()=>{

        const cutoff14=new Date(now);cutoff14.setDate(cutoff14.getDate()-14);cutoff14.setHours(0,0,0,0);
        // Use entry index as proxy for date ordering (history is sorted oldest→newest)
        // 7d = last 7 entries, prev7 = entries before that (reliable regardless of date parsing)
        const week7=history.slice(-7);

              <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:22,color:C.blue,lineHeight:1}}>{avg7??"-"}{avg7&&"/10"}</div>
              <div style={{fontSize:9,color:C.textLight,marginTop:2}}>{T.checkIn(week7.length)}</div>

            <div onClick={()=>onModuleSelect("pain-trends")} className="glass"

              <span style={{fontSize:22}}>📈</span>
              <div style={{fontSize:9,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.07em",marginTop:3}}>{T.history}</div>

          {trendVal!==null&&(

      <div style={{padding:"0 18px"}}>

const PainModule=({user,history,setHistory,onShowPaywall,onBack,initialTab})=>{
  const T=getLang(user);
  const [painTab,setPainTab]=useState(initialTab||"track"); // track | trends
  const [painLevel,setPainLevel]=useState(5);
  const [areaSymptoms,setAreaSymptoms]=useState({}); // {areaId: {symptoms:[{type}], intensity}}
  const [mood,setMood]=useState(null);
  const [traumaChecks,setTraumaChecks]=useState({});
  const [notes,setNotes]=useState("");
  const [screen,setScreen]=useState("form");
  const [isListening,setIsListening]=useState(false);
  const [voiceStatus,setVoiceStatus]=useState("");
  const [side,setSide]=useState("front");
  const recRef=useRef(null);
  const activeAreaCount=Object.keys(areaSymptoms).filter(k=>areaSymptoms[k]&&areaSymptoms[k].maxIntensity>0).length;
  const bodyType=["slim","normal","large"][[1,2,3].indexOf(user?.silhouette||2)]||"normal";
  const painColor=painLevel<=3?C.green:painLevel<=6?C.gold:C.red;
  const painLabel=[T.painNone,T.painMinimal,T.painMinimal,T.painMild,T.painMild,T.painModerate,T.painModerate,T.painSevere,T.painSevere,T.painIntense,T.painIntense][painLevel];
  const checkedCount=Object.values(traumaChecks).filter(Boolean).length;
  const selMood=MOODS.find(m=>m.value===mood);

  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setVoiceStatus(T.voiceNotSupported);return;}
    const rec=new SR();rec.continuous=false;rec.interimResults=true;rec.lang="en-US";
    rec.onstart=()=>{setIsListening(true);setVoiceStatus(T.listening);};
    rec.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join("");setNotes(t);if(e.results[0].isFinal)setVoiceStatus(T.voiceSaved);};
    rec.onerror=()=>{setIsListening(false);setVoiceStatus(T.voiceError);};
    rec.onend=()=>setIsListening(false);
    recRef.current=rec;rec.start();
  };
  const stopVoice=()=>{recRef.current?.stop();setIsListening(false);};

  const handleAreaSave=(areaId,data)=>{
    setAreaSymptoms(prev=>{
      if(!data) {const n={...prev};delete n[areaId];return n;}
      return {...prev,[areaId]:data};
    });
  };

  const handleSubmit=()=>{
    const score=Math.min(30,Math.round(((10-painLevel)*3+(mood||3)*4+checkedCount*5)/3));
    const areas=Object.entries(areaSymptoms).filter(([,d])=>d?.maxIntensity>0).map(([id,data])=>({id,...data}));
    setHistory(prev=>[...prev.slice(-13),{id:Date.now(),date:new Date().toLocaleDateString("en-US",{weekday:"short"}),fullDate:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),painLevel,mood,checkedCount,traumaChecks,areas,notes,score}]);
    setScreen("results");
  };
  const resetForm=()=>{setPainLevel(5);setAreaSymptoms({});setTraumaChecks({});setMood(null);setNotes("");setScreen("form");};

  if(screen==="results"){
    const score=Math.min(30,Math.round(((10-painLevel)*3+(mood||3)*4+checkedCount*5)/3));
    const sc=score>=20?C.green:score>=12?C.gold:C.red;
    const activeAreas=Object.entries(areaSymptoms).filter(([,v])=>v?.maxIntensity>0);
    return(
      <div style={{animation:"scaleIn 0.35s ease both"}}>
        <SectionTitle icon="✅" title={T.todaysReport} sub={T.hereIsHow}/>
        <GCard style={{textAlign:"center",padding:28}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>{T.wellbeingScore}</div>
          <div style={{fontSize:52,lineHeight:1,marginBottom:6}}>{renderStars(toStars(score),40)}</div>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:32,fontWeight:800,color:starsColor(toStars(score)),lineHeight:1}}>{toStars(score).toFixed(1)} / 5</div>
          <div style={{fontSize:13,color:C.textLight,marginTop:6}}>{starsLabel(toStars(score))}</div>
        </GCard>
        <GCard>
          <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:13}}>{T.snapshot}</div>
          {[{label:T.painLevel,value:`${painLevel}/10 · ${painLabel}`,color:painColor},{label:T.mood,value:selMood?`${selMood.emoji} ${selMood.label}`:"—",color:selMood?.color},{label:T.areasLogged,value:T.areasSaved ? `${activeAreaCount} ${T.areasLogged}` : `${activeAreaCount} area${activeAreaCount!==1?"s":""}`},{label:T.recoveryChecks,value:`${checkedCount}/${TRAUMA_CHECKS.length}`,color:C.blue}].map((row,i,arr)=>(
            <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:i<arr.length-1?"1px solid rgba(26,111,160,0.09)":"none"}}>
              <span style={{fontSize:13,color:C.textLight}}>{row.label}</span>
              <span style={{fontWeight:800,fontSize:13,color:row.color||C.textDark}}>{row.value}</span>
            </div>
          ))}
        </GCard>
        {activeAreas.length>0&&<GCard>
          <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:12}}>{T.painAreas}</div>

            return(
              <div key={id} style={{padding:"10px 0",borderBottom:"1px solid rgba(26,111,160,0.08)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{flex:1,fontSize:13,color:C.textMid,fontWeight:700}}>{data.label||areaInfo?.label||id}</span>
                  <span style={{fontSize:12,fontWeight:800,color:col}}>{maxI}/10</span>
                </div>
                {painAreas&&<div style={{fontSize:11,color:C.textLight,lineHeight:1.5}}>📍 {painAreas}</div>}
                <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap'}}>
                  {[[T.swelling,data.hasSwelling],[T.numbness,data.hasNumbness]].map(([lbl,val])=>(
                    <span key={lbl} style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:50,
                      background:val?'rgba(25,118,210,0.12)':'rgba(107,149,173,0.08)',
                      color:val?'#1565c0':'#90a4ae'}}>
                      {lbl}: {val?T.yes:T.no}
                    </span>
                  ))}
                </div>
              </div>
            );
          })}
        </GCard>}
        <div style={{margin:"0 18px 28px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <button className="btn-blue" onClick={resetForm}>{T.newCheckIn}</button>
          <button className="btn-outline" onClick={()=>setScreen("form")}>{T.viewBodyMap}</button>
        </div>
      </div>
    );
  }

  return(
    <div>
      <SectionTitle icon="🩺" title={T.painModule} sub={T.painModuleSub} onBack={onBack} onHome={onBack}/>

      {/* Tab bar */}
      <div style={{display:"flex",margin:"6px 18px 10px",borderRadius:14,background:"rgba(26,111,160,0.08)",padding:3}}>
        {[{id:"track",label:T.trackTab},{id:"trends",label:T.historyTab}].map(t=>(
          <button key={t.id} onClick={()=>setPainTab(t.id)}
            style={{flex:1,padding:"9px 0",borderRadius:11,border:"none",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:13,transition:"all 0.2s",
              background:painTab===t.id?"rgba(255,255,255,0.85)":"transparent",
              color:painTab===t.id?C.blue:C.textLight,
              boxShadow:painTab===t.id?"0 2px 8px rgba(26,80,130,0.12)":"none"}}>
            {t.label}
          </button>
        ))}
      </div>

      {painTab==="trends"&&(
        <div style={{animation:"fadeIn 0.3s ease both"}}>
          {history.length===0?(
            <GCard style={{textAlign:"center",padding:32}}>
              <div style={{fontSize:40,marginBottom:12}}>📊</div>
              <div style={{fontWeight:800,fontSize:15,color:C.textDark,marginBottom:8}}>{T.noDataYet}</div>
              <div style={{fontSize:13,color:C.textLight}}>Complete your first check-in to see trends.</div>
              <button onClick={()=>setPainTab("track")} className="btn-blue" style={{marginTop:16}}>{T.startCheckIn}</button>
            </GCard>
          ):(
            <TrendsTab history={history} onBack={onBack} embedded={true} user={user}/>
          )}
        </div>
      )}

      {painTab==="track"&&<div style={{animation:"fadeIn 0.3s ease both"}}>
      <GCard>
        <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:3}}>⚡ Pain Level</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:13}}>How intense is your overall pain right now?</div>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:68,fontWeight:800,lineHeight:1,color:painColor,transition:"color 0.3s",marginBottom:5}}>{painLevel}</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:11}}>{painLabel}</div>
        <input type="range" min={0} max={10} value={painLevel} onChange={e=>setPainLevel(Number(e.target.value))} style={{width:"100%",accentColor:painColor}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10,color:C.textLight}}>
          <span>0 None</span><span>5 Moderate</span><span>10 Intense</span>
        </div>
      </GCard>

      <GCard>
        <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:3}}>🗺️ Pain Body Map</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:4}}>Tap any area to log symptoms and intensity.</div>
        {activeAreaCount>0&&<div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:12}}>{activeAreaCount} area{activeAreaCount!==1?"s":""} logged</div>}
        <BodyMapV2
          user={user}
          bodyType={bodyType}
          areaSymptoms={areaSymptoms}
          onSave={setAreaSymptoms}
        />
      </GCard>
      <GCard>
        <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:3}}>💭 Mood Check</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:13}}>How are you feeling emotionally?</div>
        <div style={{display:"flex",gap:6}}>
          {MOODS.map(m=>(
            <div key={m.value} onClick={()=>setMood(m.value)}
              style={{flex:1,padding:"11px 4px",borderRadius:13,border:`2px solid ${mood===m.value?m.color:"rgba(26,111,160,0.14)"}`,background:mood===m.value?`${m.color}20`:"rgba(255,255,255,0.4)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s"}}>
              <span style={{fontSize:21}}>{m.emoji}</span>
              <span style={{fontSize:9,fontWeight:700,color:C.textLight,textTransform:"uppercase"}}>{m.label}</span>
            </div>
          ))}
        </div>
      </GCard>
      <GCard>
        <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:3}}>🛡️ Recovery Checks</div>
        <div style={{fontSize:12,color:C.textLight,marginBottom:13}}>Check all that apply today</div>
        {TRAUMA_CHECKS.map((item,i)=>(
          <div key={item.id} onClick={()=>setTraumaChecks(p=>({...p,[item.id]:!p[item.id]}))}
            style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:i<TRAUMA_CHECKS.length-1?"1px solid rgba(26,111,160,0.09)":"none",cursor:"pointer"}}>
            <div style={{width:21,height:21,borderRadius:6,border:`2px solid ${traumaChecks[item.id]?C.blue:"rgba(26,111,160,0.24)"}`,background:traumaChecks[item.id]?C.blue:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s"}}>
              {traumaChecks[item.id]&&<span style={{color:"#fff",fontSize:11,fontWeight:900}}>✓</span>}
            </div>
            <span style={{fontSize:15}}>{item.icon}</span>
            <span style={{fontSize:13,lineHeight:1.4,color:C.textMid}}>{item.label}</span>
          </div>
        ))}
      </GCard>
      <GCard>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
          <div style={{fontWeight:800,fontSize:14,color:C.textDark}}>📝 Your Notes</div>
          <button onClick={isListening?stopVoice:startVoice}
            style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:18,border:`1.5px solid ${isListening?C.red:C.blue}`,background:isListening?"rgba(230,57,70,0.09)":"rgba(26,111,160,0.07)",color:isListening?C.red:C.blue,fontSize:11,fontWeight:700,cursor:"pointer"}}>
            <span style={{fontSize:13,animation:isListening?"pulse 1s infinite":"none"}}>{isListening?"⏹":"🎙️"}</span>
            {isListening?"Stop":"Voice"}
          </button>
        </div>
        <div style={{fontSize:12,color:isListening?C.red:C.textLight,marginBottom:11}}>{voiceStatus||"Type or tap Voice (optional)"}</div>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={4} placeholder="How did today feel? Any wins, struggles, or observations..."
          style={{width:"100%",background:"rgba(255,255,255,0.5)",border:"1px solid rgba(26,111,160,0.13)",borderRadius:11,color:C.textDark,fontSize:13,padding:13,resize:"none",outline:"none",lineHeight:1.6}}/>
      </GCard>
      <div style={{margin:"0 18px 32px"}}>
        <button className="btn-red" onClick={handleSubmit}>{T.logCheckIn}</button>
      </div>
    </div>}
  </div>
  );
};

/* ══ VIOLENCE MODULE ══ */
const ViolenceModule=({user,onShowPaywall,onBack})=>{
  const T=getLang(user);
  const isPaid=["normal_monthly","normal_annual","premium_monthly","premium_annual"].includes(user?.plan);
  const storageKey=`p2c_vdocs_${user?.uid||user?.email||"local"}`;
  const pinKey=`p2c_vpin_${user?.uid||user?.email||"local"}`;

  const [screen,setScreen]=useState("main"); // main | newDoc | pinSetup | pinEntry | pinEntryRecords | photos | viewDoc | share | shareConfirm
  const [records,setRecords]=useState(()=>{try{return JSON.parse(localStorage.getItem(storageKey)||"[]");}catch(e){return[];}});
  const [pin,setPin]=useState(()=>localStorage.getItem(pinKey)||"");
  const [pinInput,setPinInput]=useState("");
  const [pinConfirm,setPinConfirm]=useState("");
  const [pinStep,setPinStep]=useState("enter"); // enter | confirm
  const [pinError,setPinError]=useState("");
  const [pinAttempts,setPinAttempts]=useState(0);
  const [pinLocked,setPinLocked]=useState(false);
  const [recordsUnlocked,setRecordsUnlocked]=useState(false);
  const [photos,setPhotos]=useState([]);
  const [activeDoc,setActiveDoc]=useState(null);
  const fileRef=useRef(null);

  // New incident form state
  const [incDate,setIncDate]=useState(new Date().toISOString().split("T")[0]);
  const [incType,setIncType]=useState("");
  const [incDesc,setIncDesc]=useState("");
  const [incLocation,setIncLocation]=useState("");
  const [incWitnesses,setIncWitnesses]=useState("");
  const [saving,setSaving]=useState(false);

  const saveRecords=(recs)=>{
    setRecords(recs);
    try{localStorage.setItem(storageKey,JSON.stringify(recs));}catch(e){}
  };

  // PIN entry pad
  const PinPad=({value,onChange,label,error})=>(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.textMid}}>{label}</div>
      <div style={{display:"flex",gap:12}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:18,height:18,borderRadius:"50%",border:`2px solid ${C.purple}`,background:value.length>i?C.purple:"transparent",transition:"all 0.15s"}}/>
        ))}
      </div>
      {error&&<div style={{fontSize:12,color:C.red,fontWeight:700}}>{error}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:220}}>
        {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
          <button key={i} onClick={()=>{
            if(k==="⌫") onChange(value.slice(0,-1));
            else if(k!==""&&value.length<4) onChange(value+k);
          }} style={{padding:"16px 0",borderRadius:14,border:"none",background:k===""?"transparent":"rgba(255,255,255,0.6)",fontSize:k==="⌫"?18:20,fontWeight:700,color:C.textDark,cursor:k===""?"default":"pointer",fontFamily:"'Montserrat',sans-serif",boxShadow:k===""?"none":"0 2px 8px rgba(26,80,130,0.08)"}}>
            {k}
          </button>
        ))}
      </div>
    </div>
  );

  // PIN Setup screen
  if(screen==="pinSetup") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("main")} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>{T.setSecurePIN}</div>
      </div>
      <GCard style={{marginTop:14,textAlign:"center"}}>
        <div style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.6}}>
          {pinStep==="enter"?"Choose a 4-digit PIN to protect your photos and documents.":"Enter your PIN again to confirm."}
        </div>
        <PinPad value={pinStep==="enter"?pinInput:pinConfirm} onChange={pinStep==="enter"?setPinInput:setPinConfirm} label={pinStep==="enter"?"Enter PIN":"Confirm PIN"} error={pinError}/>
        {((pinStep==="enter"&&pinInput.length===4)||(pinStep==="confirm"&&pinConfirm.length===4))&&(
          <button className="btn-blue" style={{marginTop:20,background:`linear-gradient(135deg,${C.purple},#9c4fbf)`}} onClick={()=>{
            if(pinStep==="enter"){setPinStep("confirm");setPinError("");}
            else{
              if(pinConfirm===pinInput){
                localStorage.setItem(pinKey,pinInput);
                setPin(pinInput);
                setPinInput("");setPinConfirm("");setPinStep("enter");
                setScreen("photos");
              } else {
                setPinError("PINs don't match — try again");
                setPinConfirm("");
              }
            }
          }}>
            {pinStep==="enter"?"Next →":"Set PIN & Continue →"}
          </button>
        )}
      </GCard>
    </div>
  );

  // PIN Entry for Records
  if(screen==="pinEntryRecords") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>{setScreen("main");setPinInput("");setPinError("");}} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>🔒 Your Records</div>
      </div>
      <GCard style={{marginTop:14,textAlign:"center"}}>
        {pinLocked?(
          <div style={{padding:20}}>
            <div style={{fontSize:36,marginBottom:12}}>🔒</div>
            <div style={{fontWeight:800,color:C.red,fontSize:15}}>Too many attempts</div>
            <div style={{fontSize:13,color:C.textLight,marginTop:8}}>Please wait 5 minutes before trying again.</div>
          </div>
        ):(
          <>
            <div style={{fontSize:13,color:C.textMid,marginBottom:20}}>Enter your PIN to view your incident records.</div>
            <PinPad value={pinInput} onChange={v=>{
              setPinInput(v);
              if(v.length===4){
                if(v===pin){
                  setPinInput("");setPinError("");setPinAttempts(0);
                  setRecordsUnlocked(true);
                  setScreen("main");
                } else {
                  const attempts=pinAttempts+1;
                  setPinAttempts(attempts);
                  if(attempts>=3){setPinLocked(true);setTimeout(()=>{setPinLocked(false);setPinAttempts(0);},300000);}
                  setPinError(`Incorrect PIN${attempts>=2?` · ${3-attempts} attempt${3-attempts===1?"":"s"} left`:""}`);
                  setTimeout(()=>setPinInput(""),500);
                }
              }
            }} label="Enter PIN" error={pinError}/>
          </>
        )}
      </GCard>
    </div>
  );

  // PIN Entry screen (for Secure Photos)
  if(screen==="pinEntry") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>{setScreen("main");setPinInput("");setPinError("");}} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>🔒 Secure Photos</div>
      </div>
      <GCard style={{marginTop:14,textAlign:"center"}}>
        {pinLocked?(
          <div style={{padding:20}}>
            <div style={{fontSize:36,marginBottom:12}}>🔒</div>
            <div style={{fontWeight:800,color:C.red,fontSize:15}}>Too many attempts</div>
            <div style={{fontSize:13,color:C.textLight,marginTop:8}}>Please wait 5 minutes before trying again.</div>
          </div>
        ):(
          <>
            <div style={{fontSize:13,color:C.textMid,marginBottom:20}}>Enter your PIN to access secure photos.</div>
            <PinPad value={pinInput} onChange={v=>{
              setPinInput(v);
              if(v.length===4){
                if(v===pin){
                  setPinInput("");setPinError("");setPinAttempts(0);
                  setScreen("photos");
                } else {
                  const attempts=pinAttempts+1;
                  setPinAttempts(attempts);
                  if(attempts>=3){setPinLocked(true);setTimeout(()=>{setPinLocked(false);setPinAttempts(0);},300000);}
                  setPinError(`Incorrect PIN${attempts>=2?` · ${3-attempts} attempt${3-attempts===1?"":"s"} left`:""}`);
                  setTimeout(()=>setPinInput(""),500);
                }
              }
            }} label="Enter PIN" error={pinError}/>
          </>
        )}
      </GCard>
    </div>
  );

  // Secure Photos screen
  if(screen==="photos") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>{setScreen("main");setPhotos([]);}} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>🔒 Secure Photos</div>
        </div>
        <button onClick={()=>{setScreen("main");setPhotos([]);}} style={{background:"rgba(230,57,70,0.12)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:11,fontWeight:700,color:C.red,cursor:"pointer"}}>🚪 Exit</button>
      </div>
      <GCard style={{marginTop:14,background:"rgba(123,63,158,0.06)",border:"1px solid rgba(123,63,158,0.18)"}}>
        <div style={{fontSize:12,color:C.textMid,lineHeight:1.6}}>📌 Photos are stored securely in encrypted cloud storage. They are never saved to your device gallery.</div>
      </GCard>
      <GCard>
        <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple style={{display:"none"}}
          onChange={e=>{
            const files=Array.from(e.target.files||[]);
            files.forEach(file=>{
              const reader=new FileReader();
              reader.onload=ev=>{
                const newPhoto={id:Date.now()+Math.random(),name:file.name,date:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}),data:ev.target.result};
                setPhotos(prev=>[...prev,newPhoto]);
              };
              reader.readAsDataURL(file);
            });
          }}
        />
        <button onClick={()=>fileRef.current?.click()} style={{width:"100%",padding:"14px",borderRadius:14,border:`2px dashed ${C.purple}`,background:"rgba(123,63,158,0.06)",color:C.purple,fontWeight:800,fontSize:14,cursor:"pointer"}}>
          📷 Add Photo Evidence
        </button>
        {photos.length===0&&<div style={{textAlign:"center",fontSize:12,color:C.textLight,marginTop:12}}>No photos yet. Tap above to add evidence.</div>}
      </GCard>
      {photos.length>0&&(
        <GCard>
          <div style={{fontWeight:800,fontSize:13,color:C.textDark,marginBottom:12}}>📸 {photos.length} Photo{photos.length!==1?"s":""}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {photos.map(p=>(
              <div key={p.id} style={{borderRadius:12,overflow:"hidden",position:"relative"}}>
                <img src={p.data} alt={p.name} style={{width:"100%",height:110,objectFit:"cover",display:"block"}}/>
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.55)",padding:"5px 8px",fontSize:10,color:"#fff"}}>{p.date}</div>
                <button onClick={()=>setPhotos(prev=>prev.filter(x=>x.id!==p.id))}
                  style={{position:"absolute",top:5,right:5,background:"rgba(230,57,70,0.85)",border:"none",borderRadius:"50%",width:22,height:22,color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              </div>
            ))}
          </div>
        </GCard>
      )}
    </div>
  );

  // New Incident form
  if(screen==="newDoc") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setScreen("main")} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>📝 Document Incident</div>
      </div>
      <GCard style={{marginTop:14}}>
        <div style={{fontSize:12,color:C.textMid,marginBottom:16,lineHeight:1.6}}>🔒 This record is private and encrypted. Only you can access it.</div>
        {[
          {label:"Date",type:"date",val:incDate,set:setIncDate},
          {label:"Type of Incident",type:"text",val:incType,set:setIncType,ph:"e.g. Physical, Verbal, Threat…"},
          {label:"Location",type:"text",val:incLocation,set:setIncLocation,ph:"e.g. Home, Workplace…"},
          {label:"Witnesses",type:"text",val:incWitnesses,set:setIncWitnesses,ph:"Names or 'None'"},
        ].map(f=>(
          <div key={f.label} style={{marginBottom:13}}>
            <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>{f.label}</div>
            <input className="field" type={f.type} value={f.val} onChange={e=>f.set(e.target.value)} placeholder={f.ph||""}/>
          </div>
        ))}
        <div style={{marginBottom:13}}>
          <div style={{fontSize:11,fontWeight:700,color:C.textLight,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:5}}>Description</div>
          <textarea className="field" rows={4} value={incDesc} onChange={e=>setIncDesc(e.target.value)} placeholder="Describe what happened in detail…" style={{resize:"none",lineHeight:1.6}}/>
        </div>
        <button className="btn-blue" style={{background:`linear-gradient(135deg,${C.purple},#9c4fbf)`}} disabled={saving||!incType||!incDesc}
          onClick={async()=>{
            setSaving(true);
            const newRec={id:Date.now(),date:new Date(incDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),type:incType,location:incLocation,witnesses:incWitnesses,desc:incDesc,shared:false,createdAt:Date.now()};
            const updated=[newRec,...records];
            saveRecords(updated);
            // Try Firebase
            if(window._fbReady&&fbDb&&fbRef&&fbSet&&user?.uid){
              try{await fbSet(fbRef(fbDb,`vdocs/${user.uid}/${newRec.id}`),newRec);}catch(e){}
            }
            await new Promise(r=>setTimeout(r,600));
            setSaving(false);
            setIncType("");setIncDesc("");setIncLocation("");setIncWitnesses("");
            setScreen("main");
          }}>
          {saving?"Saving…":"💾 Save Record →"}
        </button>
      </GCard>
    </div>
  );

  // View single record
  if(screen==="viewDoc"&&activeDoc) return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>{setScreen("main");setActiveDoc(null);}} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.purple}}>📄 Incident Record</div>
      </div>

              </div>
            </div>
          ):(

                <div key={r.id} onClick={()=>{setActiveDoc(r);setScreen("viewDoc");}}

        </GCard>

      <GCard>
        <div style={{fontWeight:800,fontSize:14,color:C.textDark,marginBottom:13}}>📤 Share With</div>

/* ══ TRAUMA MODULE ══ */
const TraumaModule=({user,onBack})=>{
  const T=getLang(user);
  const [active,setActive]=useState(null); // exercise id or "anchor"
  const anchorKey=`p2c_anchor_${user?.uid||user?.email||"local"}`;
  const [anchor,setAnchor]=useState(()=>{try{return JSON.parse(localStorage.getItem(anchorKey)||"null");}catch(e){return null;}});
  const [songTitle,setSongTitle]=useState(anchor?.songTitle||"");
  const [songArtist,setSongArtist]=useState(anchor?.songArtist||"");
  const [songUrl,setSongUrl]=useState(anchor?.songUrl||"");
  const [calmImage,setCalmImage]=useState(anchor?.calmImage||null);
  const [calmNote,setCalmNote]=useState(anchor?.calmNote||"");
  const [saved,setSaved]=useState(false);
  const imgRef=useRef(null);

  const saveAnchor=()=>{
    const data={songTitle,songArtist,songUrl,calmImage,calmNote,updatedAt:Date.now()};
    localStorage.setItem(anchorKey,JSON.stringify(data));
    setAnchor(data);
    setSaved(true);
    setTimeout(()=>setSaved(false),2000);
  };

  // Exercise view
  if(active&&active!=="anchor"){
    const ex=EXERCISES.find(e=>e.id===active);
    return(
      <div style={{animation:"scaleIn 0.3s ease both"}}>
        <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setActive(null)} style={{background:"rgba(26,111,160,0.09)",border:"none",borderRadius:9,padding:"5px 12px",fontSize:12,fontWeight:700,color:C.blue,cursor:"pointer"}}>{T.back_btn}</button>
          <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.textDark}}>{ex?.icon} {ex?.title}</div>
        </div>
        <GCard style={{marginTop:14}}>
          <div style={{fontSize:12,color:C.textLight,marginBottom:14}}>{ex?.desc}</div>
          {ex.steps.map((step,i)=>(
            <div key={i} style={{display:"flex",gap:13,padding:"11px 0",borderBottom:i<ex.steps.length-1?"1px solid rgba(26,111,160,0.09)":"none",alignItems:"flex-start"}}>
              <div style={{width:25,height:25,borderRadius:"50%",background:"rgba(26,111,160,0.13)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:11,color:C.blue}}>{i+1}</div>
              <span style={{fontSize:14,lineHeight:1.65,color:C.textMid}}>{step}</span>
            </div>
          ))}
        </GCard>
        <div style={{margin:"0 18px 28px"}}><button className="btn-blue" onClick={()=>setActive(null)}>{T.exerciseComplete}</button></div>
      </div>
    );
  }

  // Anchor view
  if(active==="anchor") return(
    <div style={{animation:"fadeIn 0.3s ease both"}}>
      <div style={{padding:"18px 22px 0",display:"flex",alignItems:"center",gap:10}}>

        <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:17,color:C.teal}}>⚓ My Anchor</div>
      </div>

      {/* If anchor is set — show it beautifully */}
      {anchor&&(anchor.calmImage||anchor.songTitle)&&(
        <GCard style={{background:"linear-gradient(135deg,rgba(26,140,122,0.08),rgba(26,111,160,0.06))",border:"1px solid rgba(26,140,122,0.2)",marginTop:14}}>
          <div style={{fontSize:11,fontWeight:700,color:C.teal,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Your Anchor 💙</div>
          {anchor.calmImage&&(
            <div style={{borderRadius:16,overflow:"hidden",marginBottom:12}}>
              <img src={anchor.calmImage} alt="Calm" style={{width:"100%",maxHeight:180,objectFit:"cover",display:"block"}}/>
            </div>
          )}
          {anchor.calmNote&&<div style={{fontSize:14,fontStyle:"italic",color:C.textMid,marginBottom:12,lineHeight:1.6}}>"{anchor.calmNote}"</div>}
          {anchor.songTitle&&(
            <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",borderRadius:13,background:"rgba(26,111,160,0.08)"}}>
              <span style={{fontSize:24}}>🎵</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:C.textDark}}>{anchor.songTitle}</div>

                <a href={anchor.songUrl} target="_blank" rel="noreferrer"

            <img src={calmImage} alt="Calm" style={{width:"100%",maxHeight:160,objectFit:"cover",display:"block"}}/>

        <button onClick={saveAnchor} className="btn-blue"
          style={{background:`linear-gradient(135deg,${C.teal},#2db89a)`}}>
          {saved?"✅ Saved!":"⚓ Save My Anchor"}
        </button>
      </div>
    </div>

          <div style={{flex:1}}>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:800,fontSize:15,color:C.teal}}>My Anchor</div>
            <div style={{fontSize:12,color:C.textLight,marginTop:3}}>
              {anchor?.songTitle?`🎵 ${anchor.songTitle}${anchor.songArtist?` · ${anchor.songArtist}`:""}`:anchor?.calmImage?"Image saved 🖼️":"Your power song & calm image"}

        </div>

      <GCard style={{background:"rgba(26,111,160,0.06)",border:"1px solid rgba(26,111,160,0.17)"}}>
        <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:7}}>
          <span style={{fontSize:18}}>💙</span>
          <div style={{fontWeight:800,fontSize:13,color:C.blue}}>Self-Guided Exercises</div>
        </div>
        <div style={{fontSize:13,color:C.textMid,lineHeight:1.6}}>Take your time with each exercise. There's no rush on the healing journey.</div>

      <div style={{padding:"0 18px"}}>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:18}}>

const toStars=(score)=>{
  // score 0-30 → 1-5 stars (rounded to nearest 0.5)
  const raw=1+(score/30)*4;
  const rounded=Math.round(raw*2)/2;
  return Math.min(5,Math.max(1,rounded));
};
const renderStars=(stars,size=18)=>{
  const full=Math.floor(stars);
  const half=stars%1>=0.5;
  const empty=5-full-(half?1:0);
  const s={fontSize:size,lineHeight:1};
  return React.createElement('span',{style:s},
    '⭐'.repeat(full)+(half?'✨':'')+('☆'.repeat(empty))
  );
};
const starsColor=(stars)=>stars>=4?C.green:stars>=3?C.gold:C.red;
const starsLabel=(stars)=>stars>=4.5?"Excellent day":stars>=3.5?"Good day":stars>=2.5?"Okay day":stars>=1.5?"Tough day":"Very hard day";

  const T=getLang(user);

  const [customStart,setCustomStart]=useState(weekAgo);
  const [customEnd,setCustomEnd]=useState(today);
  const filtered=(()=>{
    if(period==="custom"){
      const s=new Date(customStart);
      const e=new Date(customEnd);
      e.setHours(23,59,59);
      return history.filter(h=>{const d=new Date(h.fullDate||h.date);return d>=s&&d<=e;});
    }
    if(period===null) return history;
    const cutoff=new Date();
    cutoff.setDate(cutoff.getDate()-period);
    return history.filter(h=>new Date(h.fullDate||h.date)>=cutoff);
  })();
  const displayHistory=filtered.length>0?filtered:history;
  const chartData=displayHistory.map(h=>({day:h.date,Pain:h.painLevel,Score:h.score}));
  const trend=displayHistory.length>=2?displayHistory[displayHistory.length-1].painLevel-displayHistory[displayHistory.length-2].painLevel:0;

            </button>
